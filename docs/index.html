<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Skeleton Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{--bg:#0a0c10;--panel:#0d0f14;--card:#11131a;--border:#1a1d2e;--border-light:#252940;--accent:#7c83fd;--accent-bg:rgba(124,131,253,.09);--text:#d8dce8;--text-dim:#7a7f9a;--text-bright:#f0f2ff;--fact:#4fc3f7;--op:#ffd54f;--strat:#ef5350;--success:#66bb6a;--warn:#ffa726}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
.sidebar-header .label{font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.sidebar-header .title{font-size:16px;font-weight:800;color:var(--text-bright)}
.sidebar-header .meta{font-size:10px;color:var(--text-dim);margin-top:4px}
.group-bar{display:flex;gap:2px;padding:6px 8px;border-bottom:1px solid var(--border);overflow-x:auto}
.group-btn{padding:4px 8px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:10px;color:var(--text-dim);border-radius:4px;white-space:nowrap}
.group-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:700}
.search-box{padding:6px 8px}.search-box input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}
.prob-list{flex:1;overflow-y:auto;padding:4px 6px}
.folder-label{font-size:10px;font-weight:700;color:var(--text-dim);padding:8px 8px 4px;letter-spacing:1px}
.prob-item{padding:6px 10px;border-radius:6px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:all .15s}
.prob-item:hover{background:var(--accent-bg)}.prob-item.active{background:var(--accent-bg);border-left-color:var(--accent)}
.prob-item .id{font-size:11px;font-weight:600}.prob-item.active .id{font-weight:700;color:var(--accent)}
.prob-item .sub{font-size:9px;color:var(--text-dim);margin-top:1px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);padding:0 14px;overflow-x:auto}
.tab{padding:10px 12px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:11px;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.card{background:var(--card);border-radius:8px;padding:20px;border:1px solid var(--border);margin-bottom:16px}
.section-label{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.clue-row{display:flex;gap:10px;padding:6px 12px;background:var(--card);border-radius:6px;border:1px solid var(--border);align-items:center;margin-bottom:4px}
.clue-id{font-size:11px;font-weight:700;color:#8ab4f8;min-width:42px}.clue-text{font-size:12px}
.edge-row{padding:8px 12px;border-radius:6px;background:var(--card);margin-bottom:3px}.edge-row.side{opacity:.65;background:rgba(26,29,46,.5)}
.edge-header{display:flex;align-items:center;gap:8px;font-size:11px;flex-wrap:wrap}
.edge-num{color:var(--text-dim);font-weight:600;min-width:22px}.edge-arrow{color:var(--text-dim)}
.edge-side-badge{font-size:9px;color:var(--warn);border:1px solid rgba(255,167,38,.3);border-radius:4px;padding:1px 5px}
.edge-note{font-size:12px;color:var(--text);margin-top:4px;padding-left:30px;line-height:1.6}
.sol-step{margin-top:16px;margin-bottom:6px;font-weight:800;font-size:14px;color:var(--accent)}.sol-line{font-size:13px;line-height:2}
.neuron-group{margin-bottom:20px}.neuron-group-label{font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.neuron-row{display:flex;gap:10px;padding:6px 12px;background:var(--card);border-radius:6px;border:1px solid var(--border);margin-bottom:3px;align-items:flex-start}
.neuron-id{font-size:11px;font-weight:700;min-width:52px;flex-shrink:0}.neuron-stmt{font-size:12px;flex:1}
.neuron-count{font-size:9px;color:var(--text-dim);background:var(--border);border-radius:4px;padding:1px 6px;flex-shrink:0}
.dag-container{overflow:auto;max-height:500px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}.badge{font-size:10px;padding:2px 8px;border-radius:4px}
.badge-unit{background:var(--accent-bg);color:var(--accent)}.badge-diff{background:rgba(255,167,38,.1);color:var(--warn)}
.badge-ans{background:rgba(102,187,106,.1);color:var(--success)}.badge-edge{background:rgba(79,195,247,.1);color:var(--fact)}
.badge-src{background:rgba(124,131,253,.06);color:var(--text-dim)}
.empty{color:var(--text-dim);font-size:13px;text-align:center;margin-top:80px}
.hist-card{background:var(--card);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.hist-toggle{font-size:10px;color:var(--accent);cursor:pointer;background:var(--accent-bg);border:1px solid rgba(124,131,253,.2);border-radius:4px;padding:2px 8px}
.nlib-search{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;outline:none;font-family:inherit;margin-bottom:12px}
.tip-wrap{position:relative;display:inline}.tip-wrap .tip{display:none;position:fixed;background:#1e2235;border:1px solid var(--border-light);border-radius:6px;padding:10px 14px;font-size:11px;color:var(--text);white-space:normal;width:max-content;max-width:450px;z-index:999;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.6);pointer-events:none}.tip-wrap:hover .tip{display:block}
.mg-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}.mg-label{font-size:10px;color:var(--text-dim);min-width:60px}
.mg-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}
.mg-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;background:var(--border);border-radius:4px;color:var(--text)}.mg-tag-x{cursor:pointer;color:var(--strat);font-weight:700}
.mg-btn{padding:6px 14px;border:none;border-radius:4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}
.mg-btn-p{background:var(--accent);color:#fff}.mg-btn-s{background:var(--border-light);color:var(--text)}.mg-btn-d{background:rgba(239,83,80,.15);color:var(--strat)}
.mg-btn:disabled{opacity:.4;cursor:not-allowed}
.reg-input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:11px;outline:none;font-family:'Pretendard',monospace;resize:vertical;min-height:250px}
.reg-token{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;outline:none;font-family:inherit;margin-bottom:8px}
.reg-status{font-size:11px;padding:8px 12px;border-radius:6px;margin-top:10px}
.reg-ok{background:rgba(102,187,106,.1);color:var(--success);border:1px solid rgba(102,187,106,.2)}
.reg-err{background:rgba(239,83,80,.1);color:var(--strat);border:1px solid rgba(239,83,80,.2)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header"><div class="label">Skeleton</div><div class="title">Viewer</div><div class="meta" id="sidebar-meta">loading...</div></div>
  <div class="group-bar" id="group-bar"></div>
  <div class="search-box"><input id="search" placeholder="search..." oninput="filterProblems()"></div>
  <div class="prob-list" id="prob-list"></div>
</div>
<div class="main">
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"><div class="empty">select a problem</div></div>
</div>
<script>
var OW='koms7429-maker',RP='math-hub',BR='main';
var SECS=['problem','DAG','Skeleton','Solution','analysis','neurons','all neurons','history','manage','register'];
var GMODES=['all','source','theme','difficulty','custom'];
var probs=[],nMap={},nAll=[],sel=null,curS=0,exH={},nlQ='',gMode='all',ghTk='',bsSha='';

function d64(b){return new TextDecoder('utf-8').decode(Uint8Array.from(atob(b.replace(/\s/g,'')),function(c){return c.charCodeAt(0)}))}
function rm(t){if(!t)return'';return String(t).split(/(\$[^$]+\$)/g).map(function(p){if(p.startsWith('$')&&p.endsWith('$')){try{return katex.renderToString(p.slice(1,-1),{throwOnError:false})}catch(e){return'<code>'+p.slice(1,-1)+'</code>'}}return p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}).join('')}
function nc(id){if(!id)return'var(--text-dim)';if(id.startsWith('\uC0AC\uC2E4'))return'var(--fact)';if(id.startsWith('\uC5F0\uC0B0'))return'var(--op)';if(id.startsWith('\uC804\uB7B5'))return'var(--strat)';return'var(--text-dim)'}
function bi(to){return to?to.replace(/_\d+$/,''):''}
function pnl(l){var m=l.match(/^\|\s*((?:\uC0AC\uC2E4|\uC5F0\uC0B0|\uC804\uB7B5)\d+)\s*\|\s*(.*)\s*$/);if(m){var s=m[2].replace(/\|\s*$/,'').trim();if(s)return{id:m[1],statement:s}}return null}
function tg(p){return p.tags||{source:(p.metadata&&p.metadata.source)||'',theme:(p.metadata&&p.metadata.unit)||'',difficulty:(p.metadata&&p.metadata.difficulty)||'',custom:[]}}

document.addEventListener('mousemove',function(ev){document.querySelectorAll('.tip-wrap:hover .tip').forEach(function(t){var x=ev.clientX+12,y=ev.clientY-10;if(x+460>window.innerWidth)x=ev.clientX-460;if(y<10)y=ev.clientY+20;if(y+200>window.innerHeight)y=ev.clientY-200;t.style.left=x+'px';t.style.top=y+'px'})});

async function loadData(){
  var api=function(u){return'https://api.github.com/repos/'+OW+'/'+RP+'/contents/'+u+'?ref='+BR};
  try{var r=await Promise.all([fetch(api('bookshelf.json')),fetch(api('neuron-list.md'))]);
  if(r[0].ok){var j=await r[0].json();probs=JSON.parse(d64(j.content));bsSha=j.sha}
  if(r[1].ok){var j2=await r[1].json();d64(j2.content).split('\n').forEach(function(l){var n=pnl(l);if(n){nMap[n.id]=n;nAll.push({id:n.id,statement:n.statement,type:n.id.startsWith('\uC0AC\uC2E4')?'fact':n.id.startsWith('\uC5F0\uC0B0')?'op':'strat'})}})}}catch(e){console.error(e)}
  ghTk=localStorage.getItem('gh_token')||'';
  document.getElementById('sidebar-meta').textContent=probs.length+' problems / '+nAll.length+' neurons';
  rGB();rList();rTabs();if(probs.length>0){sel=probs[0];rList();rTabs();rCon()}}

function rGB(){document.getElementById('group-bar').innerHTML=GMODES.map(function(m){return'<button class="group-btn '+(gMode===m?'active':'')+'" onclick="sG(\''+m+'\')">'+m+'</button>'}).join('')}
function sG(m){gMode=m;rGB();rList()}

function rList(){
  var q=document.getElementById('search').value.toLowerCase();
  var f=q?probs.filter(function(p){return(p.problem_id||'').toLowerCase().indexOf(q)>=0||(p.answer||'').indexOf(q)>=0}):probs;
  var el=document.getElementById('prob-list');
  if(gMode==='all'){el.innerHTML=f.map(pI).join('');return}
  var gs={};f.forEach(function(p){var t=tg(p);var k='';
    if(gMode==='source')k=t.source||'(none)';else if(gMode==='theme')k=t.theme||'(none)';else if(gMode==='difficulty')k=t.difficulty||'(none)';
    else if(gMode==='custom'){var cl=t.custom||[];if(!cl.length)cl=['(unfiled)'];cl.forEach(function(c){if(!gs[c])gs[c]=[];gs[c].push(p)});return}
    if(!gs[k])gs[k]=[];gs[k].push(p)});
  var html='';Object.keys(gs).sort().forEach(function(k){html+='<div class="folder-label">'+k+' ('+gs[k].length+')</div>';gs[k].forEach(function(p){html+=pI(p)})});el.innerHTML=html}

function pI(p){var a=sel&&sel.problem_id===p.problem_id;return'<div class="prob-item '+(a?'active':'')+'" onclick="sP(\''+p.problem_id.replace(/'/g,"\\'")  +'\')"><div class="id">'+p.problem_id+'</div><div class="sub">'+(tg(p).theme||'')+' '+(p.answer?'ans:'+p.answer:'')+'</div></div>'}
function filterProblems(){rList()}
function sP(pid){sel=probs.find(function(p){return p.problem_id===pid});curS=0;exH={};rList();rTabs();rCon()}
function rTabs(){document.getElementById('tabs').innerHTML=SECS.map(function(s,i){var l=s;if(i===6)l='all neurons ('+nAll.length+')';if(i===7&&sel&&sel.history&&sel.history.length)l+=' ('+sel.history.length+')';if(i===8)l='manage';if(i===9)l='+ register';return'<button class="tab '+(curS===i?'active':'')+'" onclick="sT('+i+')">'+l+'</button>'}).join('')}
function sT(i){curS=i;rTabs();rCon()}

function rCon(){
  var el=document.getElementById('content');
  if(curS===6){el.innerHTML=rNlib();return}if(curS===9){el.innerHTML=rReg();return}
  if(!sel){el.innerHTML='<div class="empty">select a problem</div>';return}
  var p=sel,ed=(p.skeleton||[]).length,sd=0;for(var i=0;i<ed;i++){if(p.skeleton[i].main===false)sd++}var t=tg(p);
  var h='<div style="margin-bottom:20px"><span style="font-size:20px;font-weight:800;color:var(--text-bright)">'+p.problem_id+'</span><div class="badges">'+(t.source?'<span class="badge badge-src">'+t.source+'</span>':'')+(t.theme?'<span class="badge badge-unit">'+t.theme+'</span>':'')+(t.difficulty?'<span class="badge badge-diff">'+t.difficulty+'</span>':'')+(p.answer?'<span class="badge badge-ans">ans:'+p.answer+'</span>':'')+'<span class="badge badge-edge">edges:'+ed+'(m'+(ed-sd)+'/s'+sd+')</span>'+((t.custom||[]).map(function(c){return'<span class="badge badge-src">'+c+'</span>'}).join(''))+'</div></div>';
  switch(curS){case 0:h+=rSt(p);break;case 1:h+=rDAG(p);break;case 2:h+=rSk(p);break;case 3:h+=rSo(p);break;case 4:h+=rAn(p);break;case 5:h+=rNe(p);break;case 7:h+=rHi(p);break;case 8:h+=rMg(p);break}el.innerHTML=h}

function rSt(p){var h='<div class="card" style="line-height:1.8;font-size:13px">'+rm(p.statement||'')+'</div>';if(p.clues&&p.clues.length){h+='<div class="section-label">clues</div>';p.clues.forEach(function(c){h+='<div class="clue-row"><span class="clue-id">'+c.id+'</span><span class="clue-text">'+rm(c.text)+'</span></div>'})}return h}

function rDAG(p){if(!p.skeleton||!p.skeleton.length)return'<div class="empty">no skeleton</div>';var nodes=new Set,edges=[],cIds=new Set;if(p.clues)p.clues.forEach(function(c){cIds.add(c.id);nodes.add(c.id)});p.skeleton.forEach(function(e){var fs=Array.isArray(e.from)?e.from:[e.from];fs.forEach(function(f){if(f)nodes.add(f)});if(e.to)nodes.add(e.to);fs.forEach(function(f){if(f&&e.to)edges.push({from:f,to:e.to,main:e.main!==false})})});var adj={};edges.forEach(function(e){if(!adj[e.from])adj[e.from]=[];adj[e.from].push(e.to)});var layers={},q=[];cIds.forEach(function(c){layers[c]=0;q.push(c)});while(q.length){var n=q.shift();(adj[n]||[]).forEach(function(x){var nl=(layers[n]||0)+1;if(layers[x]===undefined||layers[x]<nl){layers[x]=nl;q.push(x)}})}var mL=0;var na=[...nodes];for(var k in layers)if(layers[k]>mL)mL=layers[k];var lN={};na.forEach(function(n){var l=layers[n]||0;if(!lN[l])lN[l]=[];lN[l].push(n)});var nW=110,nH=30,gX=30,gY=50,pos={};for(var l=0;l<=mL;l++){var ns=lN[l]||[];var tw=ns.length*nW+(ns.length-1)*gX;var sx=-tw/2;ns.forEach(function(n,i){pos[n]={x:sx+i*(nW+gX)+nW/2,y:l*(nH+gY)+nH/2+24}})}var mNL=1;for(var k in lN)if(lN[k].length>mNL)mNL=lN[k].length;var svgW=Math.max(500,mNL*(nW+gX)+120),svgH=(mL+1)*(nH+gY)+60,ox=svgW/2;var s='<div class="dag-container"><svg width="'+svgW+'" height="'+svgH+'" style="display:block"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="var(--text-dim)" stroke-width="1.5"/></marker><marker id="ahs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="var(--border-light)" stroke-width="1.5"/></marker></defs>';edges.forEach(function(e){var p1=pos[e.from],p2=pos[e.to];if(!p1||!p2)return;s+='<line x1="'+(p1.x+ox)+'" y1="'+(p1.y+nH/2)+'" x2="'+(p2.x+ox)+'" y2="'+(p2.y-nH/2)+'" stroke="'+(e.main?'var(--text-dim)':'var(--border-light)')+'" stroke-width="'+(e.main?1.2:.8)+'" '+(e.main?'':'stroke-dasharray="4 3"')+' marker-end="'+(e.main?'url(#ah)':'url(#ahs)')+'" opacity=".6"/>'});na.forEach(function(n){var p=pos[n];if(!p)return;var iC=cIds.has(n),iE=n==='END';var bg=iC?'#1a2340':iE?'#1a3020':'#151720';var br=iC?'#3a5090':iE?'var(--success)':nc(bi(n));var tc=iC?'#8ab4f8':iE?'var(--success)':nc(bi(n));s+='<rect x="'+(p.x+ox-nW/2)+'" y="'+(p.y-nH/2)+'" width="'+nW+'" height="'+nH+'" rx="'+(iE?14:6)+'" fill="'+bg+'" stroke="'+br+'" stroke-width=".8"/><text x="'+(p.x+ox)+'" y="'+(p.y+1)+'" text-anchor="middle" dominant-baseline="central" fill="'+tc+'" font-size="10" font-family="Pretendard,sans-serif" font-weight="600">'+(n.length>13?n.slice(0,12)+'..':n)+'</text>'});s+='</svg></div>';return s}

function mT(id,lb){var b=bi(id);var n=nMap[b];var c=nc(b);if(n)return'<span class="tip-wrap"><span style="color:'+c+';cursor:pointer;font-weight:700">'+lb+'</span><span class="tip"><b style="color:'+c+'">'+b+'</b><br>'+rm(n.statement)+'</span></span>';return'<span style="color:'+c+';font-weight:700">'+lb+'</span>'}
function mFT(id){var b=bi(id);var n=nMap[b];var c=nc(b);if(n)return'<span class="tip-wrap"><span style="color:'+c+';cursor:pointer">'+id+'</span><span class="tip"><b style="color:'+c+'">'+b+'</b><br>'+rm(n.statement)+'</span></span>';return'<span style="color:var(--text-dim)">'+id+'</span>'}

function rSk(p){if(!p.skeleton||!p.skeleton.length)return'<div class="empty">no skeleton</div>';var h='';p.skeleton.forEach(function(e,i){var fs=Array.isArray(e.from)?e.from:[e.from];var iS=e.main===false;var c=nc(bi(e.to));var fp=fs.map(mFT);h+='<div class="edge-row '+(iS?'side':'')+'" style="border-left:3px solid '+c+'"><div class="edge-header"><span class="edge-num">#'+(i+1)+'</span>'+fp.join(' + ')+' <span class="edge-arrow">-></span> '+mT(e.to,e.to)+(iS?' <span class="edge-side-badge">side</span>':'')+'</div>'+(e.note?'<div class="edge-note">'+rm(e.note)+'</div>':'')+'</div>'});return h}

function rSo(p){if(!p.solution)return'<div class="empty">no solution</div>';var h='<div class="card">';p.solution.split('\n').forEach(function(l){h+=(/^STEP\s+\d/.test(l)?'<div class="sol-step">':'<div class="sol-line">')+rm(l)+'</div>'});return h+'</div>'}
function rAn(p){if(!p.analysis)return'<div class="empty">no analysis</div>';var h='<div class="card" style="line-height:2">';p.analysis.split('\n').forEach(function(l){h+='<div style="font-size:13px">'+rm(l)+'</div>'});return h+'</div>'}

function rNe(p){if(!p.skeleton)return'';var us={};p.skeleton.forEach(function(e){var b=bi(e.to);if(b&&b!=='END'&&!b.startsWith('\uB2E8\uC11C'))us[b]=true});var uk=Object.keys(us);var gs=[{l:'FACT',it:uk.filter(function(n){return n.startsWith('\uC0AC\uC2E4')}).sort(),c:'var(--fact)'},{l:'OP',it:uk.filter(function(n){return n.startsWith('\uC5F0\uC0B0')}).sort(),c:'var(--op)'},{l:'STRAT',it:uk.filter(function(n){return n.startsWith('\uC804\uB7B5')}).sort(),c:'var(--strat)'}];var h='';gs.forEach(function(g){if(!g.it.length)return;h+='<div class="neuron-group"><div class="neuron-group-label" style="color:'+g.c+'">'+g.l+' ('+g.it.length+')</div>';g.it.forEach(function(id){var n=nMap[id];h+='<div class="neuron-row"><span class="neuron-id" style="color:'+g.c+'">'+id+'</span><span class="neuron-stmt">'+(n?rm(n.statement):'?')+'</span></div>'});h+='</div>'});return h}

function rNlib(){var q=nlQ.toLowerCase();var fl=function(list){return q?list.filter(function(n){return n.id.toLowerCase().indexOf(q)>=0||n.statement.toLowerCase().indexOf(q)>=0}):list};var gs=[{l:'FACT',it:fl(nAll.filter(function(n){return n.type==='fact'})),c:'var(--fact)'},{l:'OP',it:fl(nAll.filter(function(n){return n.type==='op'})),c:'var(--op)'},{l:'STRAT',it:fl(nAll.filter(function(n){return n.type==='strat'})),c:'var(--strat)'}];var h='<div style="margin-bottom:16px"><span style="font-size:18px;font-weight:800;color:var(--text-bright)">Neuron Library</span> <span style="color:var(--text-dim)">'+nAll.length+'</span></div><input class="nlib-search" placeholder="search..." value="'+nlQ+'" oninput="nlQ=this.value;rCon()">';gs.forEach(function(g){if(!g.it.length)return;h+='<div class="neuron-group"><div class="neuron-group-label" style="color:'+g.c+'">'+g.l+' ('+g.it.length+')</div>';g.it.forEach(function(n){h+='<div class="neuron-row"><span class="neuron-id" style="color:'+g.c+'">'+n.id+'</span><span class="neuron-stmt">'+rm(n.statement)+'</span></div>'});h+='</div>'});return h}

function toggleHist(i){exH[i]=!exH[i];rCon()}
function rHi(p){if(!p.history||!p.history.length)return'<div class="empty">no history</div>';var h='';[...p.history].reverse().forEach(function(v,ri){var oi=p.history.length-1-ri;h+='<div class="hist-card"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;color:var(--text-dim)">v'+(oi+1)+' (edges:'+(v.skeleton||[]).length+')</span><span class="hist-toggle" onclick="toggleHist('+oi+')">'+(exH[oi]?'collapse':'expand')+'</span></div>'+(exH[oi]?'<div style="font-size:11px;color:var(--text-dim);margin-top:8px">'+(v.created_at||'')+'</div>':'')+'</div>'});return h}

// ── Manage ──
function rMg(p){var t=tg(p);var h='<div class="section-label">Info</div><div class="card">';h+='<div class="mg-row"><span class="mg-label">ID</span><input class="mg-input" id="mg-pid" value="'+p.problem_id+'"></div>';h+='<div class="mg-row"><span class="mg-label">Answer</span><input class="mg-input" id="mg-ans" value="'+(p.answer||'')+'"></div>';h+='<div class="mg-row"><span class="mg-label">Source</span><input class="mg-input" id="mg-src" value="'+(t.source||'')+'"></div>';h+='<div class="mg-row"><span class="mg-label">Theme</span><input class="mg-input" id="mg-theme" value="'+(t.theme||'')+'"></div>';h+='<div class="mg-row"><span class="mg-label">Difficulty</span><input class="mg-input" id="mg-diff" value="'+(t.difficulty||'')+'"></div></div>';
  h+='<div class="section-label" style="margin-top:16px">Custom Tags</div><div class="card"><div id="mg-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">';(t.custom||[]).forEach(function(c,i){h+='<span class="mg-tag">'+c+' <span class="mg-tag-x" onclick="rmTag('+i+')">x</span></span>'});h+='</div><div style="display:flex;gap:6px"><input class="mg-input" id="mg-newtag" placeholder="new tag..."><button class="mg-btn mg-btn-s" onclick="addTag()">Add</button></div></div>';
  h+='<div style="display:flex;gap:10px;margin-top:20px"><button class="mg-btn mg-btn-p" id="mg-save" onclick="saveMg()">Save</button><button class="mg-btn mg-btn-d" onclick="delProb()">Delete</button></div><div id="mg-status"></div>';return h}

function addTag(){var v=document.getElementById('mg-newtag').value.trim();if(!v||!sel)return;if(!sel.tags)sel.tags=tg(sel);if(!sel.tags.custom)sel.tags.custom=[];if(sel.tags.custom.indexOf(v)<0)sel.tags.custom.push(v);rCon()}
function rmTag(i){if(!sel||!sel.tags||!sel.tags.custom)return;sel.tags.custom.splice(i,1);rCon()}

async function saveMg(){if(!ghTk){document.getElementById('mg-status').innerHTML='<div class="reg-status reg-err">Set token in register tab</div>';return}
  document.getElementById('mg-save').disabled=true;sel.problem_id=document.getElementById('mg-pid').value.trim()||sel.problem_id;sel.answer=document.getElementById('mg-ans').value.trim();
  if(!sel.tags)sel.tags={};sel.tags.source=document.getElementById('mg-src').value.trim();sel.tags.theme=document.getElementById('mg-theme').value.trim();sel.tags.difficulty=document.getElementById('mg-diff').value.trim();
  if(!sel.metadata)sel.metadata={};sel.metadata.source=sel.tags.source;sel.metadata.unit=sel.tags.theme;sel.metadata.difficulty=sel.tags.difficulty;
  try{await saveBS('update: '+sel.problem_id);document.getElementById('mg-status').innerHTML='<div class="reg-status reg-ok">Saved!</div>';rList();rTabs()}catch(e){document.getElementById('mg-status').innerHTML='<div class="reg-status reg-err">'+e.message+'</div>'}document.getElementById('mg-save').disabled=false}

async function delProb(){if(!sel||!ghTk||!confirm('Delete '+sel.problem_id+'?'))return;var idx=probs.indexOf(sel);if(idx>=0)probs.splice(idx,1);try{await saveBS('delete: '+sel.problem_id);sel=probs.length?probs[0]:null;rList();rTabs();rCon()}catch(e){alert(e.message)}}

async function saveBS(msg){var api='https://api.github.com/repos/'+OW+'/'+RP+'/contents/bookshelf.json?ref='+BR;var res=await fetch(api,{headers:{'Authorization':'token '+ghTk}});if(!res.ok)throw new Error('read:'+res.status);var g=await res.json();bsSha=g.sha;var nc=btoa(unescape(encodeURIComponent(JSON.stringify(probs,null,2))));var pr=await fetch(api,{method:'PUT',headers:{'Authorization':'token '+ghTk,'Content-Type':'application/json'},body:JSON.stringify({message:msg,content:nc,sha:bsSha,branch:BR})});if(!pr.ok)throw new Error('save:'+pr.status);bsSha=(await pr.json()).content.sha}

// ── Register ──
function rReg(){var h='<div style="margin-bottom:16px"><span style="font-size:18px;font-weight:800;color:var(--text-bright)">Register</span></div>';h+='<div class="section-label">GitHub Token</div><input class="reg-token" type="password" id="reg-token" placeholder="ghp_..." value="'+ghTk+'" onchange="svTk()">';h+='<div class="section-label" style="margin-top:12px">JSON</div><textarea class="reg-input" id="reg-json"></textarea>';h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="mg-btn mg-btn-s" onclick="valReg()">Validate</button><button class="mg-btn mg-btn-p" id="reg-sub" onclick="subReg()">Register</button></div><div id="reg-status"></div>';return h}
function svTk(){ghTk=document.getElementById('reg-token').value;localStorage.setItem('gh_token',ghTk)}
function sRS(m,ok){var el=document.getElementById('reg-status');if(el)el.innerHTML='<div class="reg-status '+(ok?'reg-ok':'reg-err')+'">'+m+'</div>'}
function valReg(){var r=document.getElementById('reg-json').value.trim();if(!r){sRS('empty',false);return}try{var d=JSON.parse(r);var e=Array.isArray(d)?d:[d];var er=[];e.forEach(function(x,i){if(!x.problem_id)er.push(i+': no id');if(!x.skeleton||!x.skeleton.length)er.push(i+': no skeleton')});if(er.length)sRS(er.join(', '),false);else sRS('Valid! '+e.length+' items',true)}catch(e){sRS('parse error',false)}}
async function subReg(){if(!ghTk){sRS('set token',false);return}var r=document.getElementById('reg-json').value.trim();if(!r)return;var d;try{d=JSON.parse(r)}catch(e){sRS('parse error',false);return}var entries=Array.isArray(d)?d:[d];entries.forEach(function(e){if(!e.created_at)e.created_at=new Date().toISOString();if(!e.history)e.history=[]});document.getElementById('reg-sub').disabled=true;sRS('saving...',true);
  try{var ad=[],up=[];entries.forEach(function(entry){var ex=probs.find(function(x){return x.problem_id===entry.problem_id});if(ex){if(!ex.history)ex.history=[];ex.history.push({skeleton:ex.skeleton,solution:ex.solution,analysis:ex.analysis,created_at:ex.created_at});Object.assign(ex,entry);up.push(entry.problem_id)}else{probs.push(entry);ad.push(entry.problem_id)}});await saveBS('register: '+ad.concat(up).join(', '));sRS('Done! +'+ad.length+' ~'+up.length+' total:'+probs.length,true);rList();rTabs();document.getElementById('reg-json').value=''}catch(e){sRS(e.message,false)}document.getElementById('reg-sub').disabled=false}

loadData();
</script>
</body>
