<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Math Skeleton Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{--bg:#0a0c10;--pn:#0d0f14;--cd:#11131a;--bd:#1a1d2e;--bl:#252940;--ac:#7c83fd;--ab:rgba(124,131,253,.09);--tx:#d8dce8;--td:#7a7f9a;--tb:#f0f2ff;--fc:#4fc3f7;--op:#ffd54f;--st:#ef5350;--ok:#66bb6a;--wn:#ffa726}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard',-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sb{width:300px;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.sb-hd .lb{font-size:11px;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:2px}
.sb-hd .tt{font-size:20px;font-weight:800;color:var(--tb)}
.sb-hd .mt{font-size:12px;color:var(--td);margin-top:4px}
.vw-bar{display:flex;gap:0;padding:6px 8px;border-bottom:1px solid var(--bd);overflow-x:auto}
.vw-btn{padding:6px 10px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:12px;color:var(--td);border-radius:4px;white-space:nowrap}.vw-btn:hover{color:var(--tx)}.vw-btn.on{background:var(--ab);color:var(--ac);font-weight:700}
.sb-sr{padding:6px 8px}.sb-sr input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.sb-ls{flex:1;overflow-y:auto;padding:4px 6px;position:relative;user-select:none}

/* Lasso overlay */
.lasso{position:absolute;border:1px solid var(--ac);background:rgba(124,131,253,.12);pointer-events:none;z-index:10;border-radius:2px}

/* Bulk bar */
.bulk{padding:8px 10px;background:var(--ac);display:flex;gap:8px;align-items:center;font-size:12px;color:#fff;font-weight:700;flex-wrap:wrap}
.bulk button{padding:4px 10px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.2);color:#fff}.bulk button:hover{background:rgba(255,255,255,.35)}
.bulk select{padding:3px 8px;border:none;border-radius:4px;font-size:11px;background:rgba(255,255,255,.2);color:#fff;font-family:inherit}
.bulk input[type=text]{padding:3px 8px;border:none;border-radius:4px;font-size:11px;background:rgba(255,255,255,.18);color:#fff;font-family:inherit;outline:none;width:100px}
.bulk input[type=text]::placeholder{color:rgba(255,255,255,.5)}
.bulk-row{display:flex;gap:6px;align-items:center;width:100%}
.bulk-label{font-size:11px;min-width:56px;font-weight:600;opacity:.85}

/* Folder labels */
.fl{font-size:13px;font-weight:700;color:var(--td);padding:8px 8px 4px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:5px;border-radius:4px}.fl:hover{color:var(--ac)}
.fl-drop{background:var(--ab);outline:1.5px dashed var(--ac);outline-offset:-2px}

/* Problem items */
.pi{padding:6px 10px 6px 16px;border-radius:5px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:all .1s;font-size:13px;display:flex;align-items:center;gap:8px}
.pi:hover{background:var(--ab)}.pi.on{background:var(--ab);border-left-color:var(--ac)}.pi.sel-m{background:rgba(124,131,253,.15)}
.pi.dragging{opacity:.35;transform:scale(.97)}
.pi[draggable=true]{cursor:grab}.pi[draggable=true]:active{cursor:grabbing}
.pi .cb{width:14px;height:14px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.pi .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pi.on .nm{font-weight:700;color:var(--ac)}
.pi .inf{font-size:10px;color:var(--td);flex-shrink:0}

/* Main */
.mn{flex:1;display:flex;flex-direction:column;min-width:0}
.tb-bar{display:flex;border-bottom:1px solid var(--bd);background:var(--pn);padding:0 12px;overflow-x:auto}
.tb{padding:11px 13px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:13px;color:var(--td);border-bottom:2px solid transparent;white-space:nowrap}.tb:hover{color:var(--tx)}.tb.on{color:var(--ac);font-weight:700;border-bottom-color:var(--ac)}
.ct{flex:1;overflow-y:auto;padding:20px 24px}

/* Cards */
.cd{background:var(--cd);border-radius:8px;padding:18px;border:1px solid var(--bd);margin-bottom:14px}
.sl{font-size:12px;font-weight:700;color:var(--td);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.bg{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}.badge{font-size:11px;padding:3px 8px;border-radius:4px}
.b-u{background:var(--ab);color:var(--ac)}.b-d{background:rgba(255,167,38,.1);color:var(--wn)}.b-a{background:rgba(102,187,106,.1);color:var(--ok)}.b-e{background:rgba(79,195,247,.1);color:var(--fc)}.b-v{background:rgba(124,131,253,.1);color:var(--ac)}.b-t{background:rgba(124,131,253,.06);color:var(--td)}

/* Edges */
.er{padding:8px 12px;border-radius:5px;background:var(--cd);margin-bottom:3px}.er.side{opacity:.6;background:rgba(26,29,46,.5)}
.eh{display:flex;align-items:center;gap:6px;font-size:13px;flex-wrap:wrap}
.en{font-size:13px;color:var(--tx);margin-top:3px;padding-left:28px;line-height:1.6}
.es{font-size:10px;color:var(--wn);border:1px solid rgba(255,167,38,.3);border-radius:4px;padding:2px 6px}

/* Tooltip */
.tw{position:relative;display:inline}.tw .tp{display:none;position:fixed;background:#1e2235;border:1px solid var(--bl);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--tx);white-space:normal;width:max-content;max-width:440px;z-index:999;line-height:1.5;box-shadow:0 4px 14px rgba(0,0,0,.6);pointer-events:none}.tw:hover .tp{display:block}

/* Neurons */
.ng{margin-bottom:16px}.ngl{font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.nr{display:flex;gap:10px;padding:6px 12px;background:var(--cd);border-radius:5px;border:1px solid var(--bd);margin-bottom:3px;align-items:flex-start}
.ni{font-size:13px;font-weight:700;min-width:52px;flex-shrink:0}.ns{font-size:13px;flex:1}.nc{font-size:10px;color:var(--td);background:var(--bd);border-radius:4px;padding:2px 6px;flex-shrink:0}

/* DAG */
.dag{overflow:auto;max-height:520px;background:var(--bg);border-radius:8px;border:1px solid var(--bd)}
.dag-lg{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--td);flex-wrap:wrap}

/* History */
.hc{background:var(--cd);border-radius:8px;padding:14px;border:1px solid var(--bd);margin-bottom:10px}
.ht{font-size:11px;color:var(--ac);cursor:pointer;background:var(--ab);border:1px solid rgba(124,131,253,.2);border-radius:4px;padding:3px 7px}

/* Manage & Register */
.mg-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.mg-label{font-size:13px;color:var(--td);min-width:80px}
.mg-input{flex:1;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.mg-tag{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--ab);color:var(--ac);display:inline-flex;align-items:center;gap:4px}
.mg-tag-x{cursor:pointer;font-weight:700;opacity:.6}.mg-tag-x:hover{opacity:1}
.mg-btn{padding:8px 16px;border:none;border-radius:5px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.mg-btn-p{background:var(--ac);color:#fff}.mg-btn-s{background:var(--bl);color:var(--tx)}.mg-btn-d{background:#3a1515;color:var(--st)}
.mg-btn:disabled{opacity:.4;cursor:not-allowed}
.reg-input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;resize:vertical;min-height:90px}
.reg-token{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
.reg-status{font-size:12px;padding:8px 12px;border-radius:5px;margin-top:8px}
.reg-ok{background:rgba(102,187,106,.1);color:var(--ok);border:1px solid rgba(102,187,106,.2)}
.reg-err{background:rgba(239,83,80,.1);color:var(--st);border:1px solid rgba(239,83,80,.2)}
.nlib-search{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
.empty{color:var(--td);font-size:14px;text-align:center;margin-top:60px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}

/* Drag ghost */
.drag-ghost{position:fixed;pointer-events:none;z-index:1000;background:var(--cd);border:1px solid var(--ac);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--ac);font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.5);opacity:.92}
</style>
</head>
<body>
<div class="sb">
  <div class="sb-hd"><div class="lb">Skeleton</div><div class="tt">Viewer</div><div class="mt" id="meta">loading...</div></div>
  <div class="vw-bar" id="vwbar"></div>
  <div class="sb-sr"><input id="sq" placeholder="search..." oninput="rList()"></div>
  <div id="bulkbar"></div>
  <div class="sb-ls" id="slist"></div>
</div>
<div class="mn">
  <div class="tb-bar" id="tbar"></div>
  <div class="ct" id="ct"><div class="empty">select a problem</div></div>
</div>
<script>
var OW='koms7429-maker',RP='math-hub',BR='main';
var TABS=['problem','DAG','Skeleton','Solution','neurons','all neurons','history','manage','register'];
var VW=['All','Source','Theme','Difficulty','Folder'];
var probs=[],nMap={},nAll=[],sel=null,curT=0,curV=0,exH={},nlQ='',ghTk='',bsSha='';
var multiSel=new Set();var collapsed={};var dragPid=null;

/* Folder nesting: folderParent[child] = parentFolder or null */
var folderParent={};
try{var _fp=localStorage.getItem('folderParent');if(_fp)folderParent=JSON.parse(_fp)}catch(e){}
function saveFP(){localStorage.setItem('folderParent',JSON.stringify(folderParent))}

/* Lasso state */
var lassoActive=false,lassoStart=null,lassoEl=null;

/* Utils */
function d64(b){return new TextDecoder('utf-8').decode(Uint8Array.from(atob(b.replace(/\s/g,'')),function(c){return c.charCodeAt(0)}))}
function rm(t){if(!t)return'';return String(t).split(/(\$[^$]+\$)/g).map(function(p){if(p.startsWith('$')&&p.endsWith('$')){try{return katex.renderToString(p.slice(1,-1),{throwOnError:false})}catch(e){return'<code>'+p.slice(1,-1)+'</code>'}}return p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}).join('')}
function nc(id){if(!id)return'var(--td)';if(id.startsWith('\uc0ac\uc2e4'))return'var(--fc)';if(id.startsWith('\uc5f0\uc0b0'))return'var(--op)';if(id.startsWith('\uc804\ub7b5'))return'var(--st)';return'var(--td)'}
function bi(to){return to?to.replace(/_\d+$/,''):''}
function nTy(id){if(id.startsWith('\uc0ac\uc2e4'))return'fact';if(id.startsWith('\uc5f0\uc0b0'))return'op';if(id.startsWith('\uc804\ub7b5'))return'strat';return''}
function pNL(l){var m=l.match(/^\|\s*((?:\uc0ac\uc2e4|\uc5f0\uc0b0|\uc804\ub7b5)\d+)\s*\|\s*(.*)\s*$/);if(m){var s=m[2].replace(/\|\s*$/,'').trim();if(s)return{id:m[1],statement:s}}return null}
function tg(p){return{source:(p.metadata&&p.metadata.source)||(p.tags&&p.tags.source)||'',theme:(p.metadata&&p.metadata.unit)||(p.tags&&p.tags.theme)||'',difficulty:(p.metadata&&p.metadata.difficulty)||(p.tags&&p.tags.difficulty)||'',custom:(p.tags&&p.tags.custom)||[]}}
function allFolders(){var s=new Set();probs.forEach(function(p){(p.tags&&p.tags.custom||[]).forEach(function(f){s.add(f)})});return[...s].sort()}

/* Tooltip tracking */
document.addEventListener('mousemove',function(ev){var ts=document.querySelectorAll('.tw:hover .tp');ts.forEach(function(t){var x=ev.clientX+10,y=ev.clientY-8;if(x+440>window.innerWidth)x=ev.clientX-440;if(y<8)y=ev.clientY+18;if(y+180>window.innerHeight)y=ev.clientY-180;t.style.left=x+'px';t.style.top=y+'px'})});

/* Load */
async function load(){
  var api=function(u){return'https://api.github.com/repos/'+OW+'/'+RP+'/contents/'+u+'?ref='+BR};
  try{var r=await Promise.all([fetch(api('bookshelf.json')),fetch(api('neuron-list.md'))]);
    if(r[0].ok){var j=await r[0].json();probs=JSON.parse(d64(j.content));bsSha=j.sha}
    if(r[1].ok){var j2=await r[1].json();var t=d64(j2.content);t.split('\n').forEach(function(l){var n=pNL(l);if(n){nMap[n.id]={id:n.id,statement:n.statement};nAll.push({id:n.id,statement:n.statement,type:nTy(n.id)})}})}}catch(e){console.error(e)}
  ghTk=localStorage.getItem('gh_token')||'';
  document.getElementById('meta').textContent=probs.length+' problems / '+nAll.length+' neurons';
  rVW();rList();rTabs();
  if(probs.length>0){sel=probs[0];rList();rTabs();rCon()}}

/* Views */
function rVW(){document.getElementById('vwbar').innerHTML=VW.map(function(v,i){return'<button class="vw-btn '+(curV===i?'on':'')+'" onclick="curV='+i+';rList()">'+v+'</button>'}).join('')}

/* ── Folder tree helpers ── */
function getFolderChildren(parent){
  var all=allFolders();
  return all.filter(function(f){return(folderParent[f]||null)===(parent||null)})}

function isDescendant(child,ancestor){
  var cur=child;var i=0;
  while(folderParent[cur]&&i<20){if(folderParent[cur]===ancestor)return true;cur=folderParent[cur];i++}
  return false}

function renderFolderTree(groups,parentFolder,depth){
  var html='';
  var children=getFolderChildren(parentFolder);
  var allGroupKeys=Object.keys(groups);
  var relevant=children.filter(function(f){return allGroupKeys.indexOf(f)>=0||getFolderChildren(f).length>0});
  if(!parentFolder){
    allGroupKeys.forEach(function(k){if(!folderParent[k]&&relevant.indexOf(k)<0)relevant.push(k)});
    relevant.sort();
  }
  relevant.forEach(function(k){
    var key=curV+'_'+k;var col=collapsed[key];
    var indent=depth*18;
    html+='<div class="fl" data-folder="'+k+'" draggable="true" style="padding-left:'+(8+indent)+'px" onclick="collapsed[\''+key+'\']=!collapsed[\''+key+'\'];rList()" ondragover="event.preventDefault();this.classList.add(\'fl-drop\')" ondragleave="this.classList.remove(\'fl-drop\')" ondrop="dropToFolder(\''+k.replace(/'/g,"\\'")+'\',event)">'+(!col?'&#9660; ':'&#9654; ')+k+' ('+(groups[k]?groups[k].length:0)+')</div>';
    if(!col){
      if(groups[k]){groups[k].forEach(function(p){html+=piH(p,depth)})}
      html+=renderFolderTree(groups,k,depth+1);
    }
  });
  return html;
}

/* Sidebar List */
function rList(){
  rVW();
  var q=document.getElementById('sq').value.toLowerCase();
  var f=q?probs.filter(function(p){return(p.problem_id||'').toLowerCase().indexOf(q)>=0||(p.answer||'').indexOf(q)>=0||(p.statement||'').toLowerCase().indexOf(q)>=0}):probs;
  var el=document.getElementById('slist');
  rBulk();
  if(curV===0){el.innerHTML=f.map(function(p){return piH(p,0)}).join('');return}
  var groups={};
  f.forEach(function(p){var t=tg(p);var keys=[];
    if(curV===1)keys=[t.source||'unknown'];
    else if(curV===2)keys=[t.theme||'unknown'];
    else if(curV===3)keys=[t.difficulty||'unknown'];
    else if(curV===4){keys=t.custom.length?t.custom:['(none)']}
    keys.forEach(function(k){if(!groups[k])groups[k]=[];groups[k].push(p)})});

  if(curV===4){
    el.innerHTML=renderFolderTree(groups,null,0);
    return;
  }
  var sk=Object.keys(groups).sort();
  var html='';
  sk.forEach(function(k){
    var key=curV+'_'+k;var col=collapsed[key];
    html+='<div class="fl" data-folder="'+k+'" onclick="collapsed[\''+key+'\']=!collapsed[\''+key+'\'];rList()" ondragover="event.preventDefault();this.classList.add(\'fl-drop\')" ondragleave="this.classList.remove(\'fl-drop\')" ondrop="dropToFolder(\''+k.replace(/'/g,"\\'")+'\',event)">'+(!col?'&#9660; ':'&#9654; ')+k+' ('+groups[k].length+')</div>';
    if(!col){groups[k].forEach(function(p){html+=piH(p,0)})}});
  el.innerHTML=html}

function piH(p,depth){
  var a=sel&&sel.problem_id===p.problem_id;
  var m=multiSel.has(p.problem_id);
  var dr=dragPid===p.problem_id;
  var indent=depth?depth*18:0;
  return'<div class="pi'+(a?' on':'')+(m?' sel-m':'')+(dr?' dragging':'')+'" data-pid="'+p.problem_id+'" draggable="true" style="padding-left:'+(16+indent)+'px" ondragstart="dStart(\''+p.problem_id+'\',event)" ondragend="dEnd()" onclick="pClick(\''+p.problem_id+'\',event)"><input type="checkbox" class="cb" '+(m?'checked':'')+' onclick="cbClick(\''+p.problem_id+'\',event)"><span class="nm">'+p.problem_id+'</span><span class="inf">'+(p.answer?p.answer:'')+' e'+(p.skeleton||[]).length+'</span></div>'}

/* Multi-select */
function pClick(pid,ev){
  if(ev.target.classList.contains('cb'))return;
  if(ev.shiftKey&&sel){
    var i1=probs.findIndex(function(p){return p.problem_id===sel.problem_id});
    var i2=probs.findIndex(function(p){return p.problem_id===pid});
    var lo=Math.min(i1,i2),hi=Math.max(i1,i2);
    for(var i=lo;i<=hi;i++)multiSel.add(probs[i].problem_id);
  }else if(ev.ctrlKey||ev.metaKey){
    if(multiSel.has(pid))multiSel.delete(pid);else multiSel.add(pid);
  }else{
    multiSel.clear();
  }
  sel=probs.find(function(p){return p.problem_id===pid});
  curT=0;exH={};rList();rTabs();rCon()}

function cbClick(pid,ev){
  ev.stopPropagation();
  if(multiSel.has(pid))multiSel.delete(pid);else multiSel.add(pid);
  rList()}

/* ── Lasso selection ── */
(function(){
  document.addEventListener('mousedown',function(ev){
    var slist=document.getElementById('slist');
    if(!slist||!slist.contains(ev.target))return;
    if(ev.target.closest('.pi')||ev.target.closest('.fl')||ev.target.closest('.cb')||ev.target.closest('input'))return;
    if(ev.button!==0)return;
    lassoActive=true;
    var rect=slist.getBoundingClientRect();
    lassoStart={x:ev.clientX,y:ev.clientY,scrollTop:slist.scrollTop};
    lassoEl=document.createElement('div');
    lassoEl.className='lasso';
    lassoEl.style.left='0';lassoEl.style.top='0';lassoEl.style.width='0';lassoEl.style.height='0';
    slist.appendChild(lassoEl);
    if(!ev.ctrlKey&&!ev.metaKey&&!ev.shiftKey)multiSel.clear();
    ev.preventDefault();
  });
  document.addEventListener('mousemove',function(ev){
    if(!lassoActive||!lassoEl||!lassoStart)return;
    var slist=document.getElementById('slist');
    if(!slist)return;
    var rect=slist.getBoundingClientRect();
    var scrollDelta=slist.scrollTop-lassoStart.scrollTop;
    /* Start position relative to slist content */
    var sx=lassoStart.x-rect.left;
    var sy=lassoStart.y-rect.top+scrollDelta;
    /* Current position relative to slist content */
    var cx=ev.clientX-rect.left;
    var cy=ev.clientY-rect.top;
    /* Lasso box in content coordinates */
    var lx=Math.max(0,Math.min(sx,cx));
    var ly=Math.min(sy,cy);
    var lw=Math.abs(cx-sx);
    var lh=Math.abs(cy-sy);
    lassoEl.style.left=lx+'px';
    lassoEl.style.top=ly+'px';
    lassoEl.style.width=lw+'px';
    lassoEl.style.height=lh+'px';
    /* Hit test with viewport coordinates */
    var lassoRect={
      left:Math.min(lassoStart.x,ev.clientX),
      top:Math.min(lassoStart.y,ev.clientY),
      right:Math.max(lassoStart.x,ev.clientX),
      bottom:Math.max(lassoStart.y,ev.clientY)};
    var items=slist.querySelectorAll('.pi[data-pid]');
    var newSel=new Set(multiSel);
    items.forEach(function(el){
      var ir=el.getBoundingClientRect();
      var pid=el.getAttribute('data-pid');
      if(ir.bottom>lassoRect.top&&ir.top<lassoRect.bottom&&ir.right>lassoRect.left&&ir.left<lassoRect.right){
        newSel.add(pid);el.classList.add('sel-m');
      }
    });
    multiSel=newSel;
  });
  document.addEventListener('mouseup',function(){
    if(!lassoActive)return;
    lassoActive=false;
    if(lassoEl&&lassoEl.parentNode)lassoEl.parentNode.removeChild(lassoEl);
    lassoEl=null;lassoStart=null;

})();

/* Bulk actions bar */
function rBulk(){

  if(multiSel.size<2){el.innerHTML='';return}
  var folders=allFolders();
  var opts=folders.map(function(f){return'<option value="'+f+'">'+f+'</option>'}).join('');
  var cSrc=null,cThm=null,cDif=null,first=true;

    var p=probs.find(function(x){return x.problem_id===pid});

  });

  h+='<button onclick="bulkMove()">Move</button><button onclick="bulkDel()">Delete</button><button onclick="multiSel.clear();rList()">Clear</button></div>';
  h+='<div class="bulk-row"><span class="bulk-label">Source</span><input type="text" id="bulk-src" value="'+(cSrc||'')+'" placeholder="source...">';
  h+='<span class="bulk-label">Theme</span><input type="text" id="bulk-thm" value="'+(cThm||'')+'" placeholder="theme...">';
  h+='<span class="bulk-label">Diff</span><input type="text" id="bulk-dif" value="'+(cDif||'')+'" placeholder="diff...">';
  h+='<button onclick="bulkInfo()">Apply</button></div>';

async function bulkInfo(){
  var src=document.getElementById('bulk-src').value.trim();
  var thm=document.getElementById('bulk-thm').value.trim();
  var dif=document.getElementById('bulk-dif').value.trim();
  multiSel.forEach(function(pid){
    var p=probs.find(function(x){return x.problem_id===pid});
    if(!p)return;
    if(!p.tags)p.tags=tg(p);if(!p.metadata)p.metadata={};
    if(src){p.tags.source=src;p.metadata.source=src}
    if(thm){p.tags.theme=thm;p.metadata.unit=thm}
    if(dif){p.tags.difficulty=dif;p.metadata.difficulty=dif}
  });
  if(ghTk){try{await saveBS('bulk info update')}catch(e){alert(e.message)}}
  rList();if(sel)rCon();
}

async function bulkMove(){
  var v=document.getElementById('bulk-folder').value;
  if(!v)return;
  if(v==='__new'){v=prompt('New folder name:');if(!v)return}
  multiSel.forEach(function(pid){
    var p=probs.find(function(x){return x.problem_id===pid});
    if(p){if(!p.tags)p.tags=tg(p);if(!p.tags.custom)p.tags.custom=[];if(p.tags.custom.indexOf(v)<0)p.tags.custom.push(v)}});
  if(ghTk){try{await saveBS('bulk move to '+v)}catch(e){alert(e.message)}}

async function bulkDel(){
  if(!confirm('Delete '+multiSel.size+' problems?'))return;
  if(!ghTk){alert('Set token first');return}
  multiSel.forEach(function(pid){var idx=probs.findIndex(function(x){return x.problem_id===pid});if(idx>=0)probs.splice(idx,1)});
  try{await saveBS('bulk delete');sel=probs.length?probs[0]:null;multiSel.clear();rList();rTabs();rCon()}catch(e){alert(e.message)}}

/* Drag & Drop */
function dStart(pid,ev){
  dragPid=pid;
  var count=multiSel.has(pid)?multiSel.size:1;
  var label=count>1?count+' items':pid;
  var ghost=document.createElement('div');
  ghost.className='drag-ghost';
  ghost.textContent=label;
  document.body.appendChild(ghost);
  ev.dataTransfer.setDragImage(ghost,0,0);
  setTimeout(function(){document.body.removeChild(ghost)},0);
  ev.dataTransfer.effectAllowed='move';
  rList();
}
function dEnd(){dragPid=null;rList()}
function dropToFolder(folder,ev){
  ev.preventDefault();ev.stopPropagation();
  var targetEl=ev.currentTarget;
  if(targetEl)targetEl.classList.remove('fl-drop');

  /* If a folder is being dragged (not a problem item) */
  if(dragFolder){
    if(dragFolder!==folder&&!isDescendant(folder,dragFolder)){
      folderParent[dragFolder]=folder;
      saveFP();
    }
    dragFolder=null;dragPid=null;rList();return;
  }

  var pids=multiSel.size>1&&multiSel.has(dragPid)?[...multiSel]:(dragPid?[dragPid]:[]);
  pids.forEach(function(pid){
    var p=probs.find(function(x){return x.problem_id===pid});
    if(p){if(!p.tags)p.tags=tg(p);if(!p.tags.custom)p.tags.custom=[];if(p.tags.custom.indexOf(folder)<0)p.tags.custom.push(folder)}});
  dragPid=null;
  if(ghTk&&pids.length){saveBS('drag to '+folder).catch(function(e){alert(e.message)})}
  rList()}

/* Folder drag (folder into folder) */
var dragFolder=null;
document.addEventListener('dragstart',function(ev){
  var fl=ev.target.closest('.fl[data-folder]');
  if(fl&&curV===4){
    var fn=fl.getAttribute('data-folder');
    if(fn){
      dragFolder=fn;
      ev.dataTransfer.effectAllowed='move';
      var ghost=document.createElement('div');
      ghost.className='drag-ghost';
      ghost.textContent='\uD83D\uDCC1 '+fn;
      document.body.appendChild(ghost);
      ev.dataTransfer.setDragImage(ghost,0,0);
      setTimeout(function(){document.body.removeChild(ghost)},0);
    }
  }
});

/* Unparent folder: double-click a folder to unparent it */
document.addEventListener('dblclick',function(ev){
  var fl=ev.target.closest('.fl[data-folder]');
  if(fl&&curV===4){
    var fn=fl.getAttribute('data-folder');
    if(fn&&folderParent[fn]){
      delete folderParent[fn];
      saveFP();rList();
    }
  }
});

/* Tabs */
function rTabs(){document.getElementById('tbar').innerHTML=TABS.map(function(s,i){
  var l=s;
  if(i===5)l='all ('+nAll.length+')';
  if(i===6&&sel&&sel.history&&sel.history.length)l+=' ('+sel.history.length+')';
  if(i===8)l='+ register';
  return'<button class="tb '+(curT===i?'on':'')+'" onclick="curT='+i+';rTabs();rCon()">'+l+'</button>'}).join('')}

/* Content */
function rCon(){
  var el=document.getElementById('ct');
  if(curT===5){el.innerHTML=rNlib();return}
  if(curT===8){el.innerHTML=rReg();return}
  if(!sel){el.innerHTML='<div class="empty">select a problem</div>';return}
  var p=sel,sk=p.skeleton||[],edges=sk.length,sides=0;
  for(var i=0;i<sk.length;i++){if(sk[i].main===false)sides++}
  var hc=(p.history||[]).length;var t=tg(p);
  var h='<div style="margin-bottom:16px"><div style="font-size:22px;font-weight:800;color:var(--tb)">'+p.problem_id+'</div><div class="bg">'+(t.source?'<span class="badge b-u">'+t.source+'</span>':'')+(t.theme?'<span class="badge b-u">'+t.theme+'</span>':'')+(t.difficulty?'<span class="badge b-d">'+t.difficulty+'</span>':'')+(p.answer?'<span class="badge b-a">ans:'+p.answer+'</span>':'')+'<span class="badge b-e">e:'+edges+'(m'+(edges-sides)+'/s'+sides+')</span>'+(hc?'<span class="badge b-v">v'+(hc+1)+'</span>':'')+(t.custom||[]).map(function(c){return'<span class="badge b-t">'+c+'</span>'}).join('')+'</div></div>';
  switch(curT){case 0:h+=rSt(p);break;case 1:h+=rDAG(p);break;case 2:h+=rSk(p);break;case 3:h+=rSo(p);break;case 4:h+=rNu(p);break;case 6:h+=rHi(p);break;case 7:h+=rMg(p);break}
  el.innerHTML=h}

/* Tab 0: Problem + Analysis */
function rSt(p){
  var h='<div class="cd" style="line-height:1.9;font-size:14px">'+rm(p.statement||'')+'</div>';
  if(p.clues&&p.clues.length){h+='<div class="sl">Clues</div>';for(var i=0;i<p.clues.length;i++){h+='<div style="display:flex;gap:10px;padding:6px 12px;background:var(--cd);border-radius:5px;border:1px solid var(--bd);margin-bottom:3px;align-items:center"><span style="font-size:13px;font-weight:700;color:#8ab4f8;min-width:42px">'+p.clues[i].id+'</span><span style="font-size:13px">'+rm(p.clues[i].text)+'</span></div>'}}
  if(p.analysis){h+='<div class="sl" style="margin-top:16px">Analysis</div><div class="cd" style="line-height:1.9">';var ls=p.analysis.split('\n');for(var i=0;i<ls.length;i++){h+='<div style="font-size:13px">'+rm(ls[i])+'</div>'}h+='</div>'}
  return h}

/* Tab 1: DAG */
function rDAG(p){
  var sk=p.skeleton;if(!sk||!sk.length)return'<div class="empty">no skeleton</div>';
  var nodes=new Set,edges=[],cIds=new Set;
  if(p.clues)for(var i=0;i<p.clues.length;i++){cIds.add(p.clues[i].id);nodes.add(p.clues[i].id)}
  for(var i=0;i<sk.length;i++){var e=sk[i];var fs=Array.isArray(e.from)?e.from:[e.from];for(var j=0;j<fs.length;j++){if(fs[j])nodes.add(fs[j])}if(e.to)nodes.add(e.to);for(var j=0;j<fs.length;j++){if(fs[j]&&e.to)edges.push({f:fs[j],t:e.to,m:e.main!==false})}}
  var adj={};edges.forEach(function(e){if(!adj[e.f])adj[e.f]=[];adj[e.f].push(e.t)});
  var lay={},q=[];cIds.forEach(function(c){lay[c]=0;q.push(c)});
  while(q.length){var n=q.shift();(adj[n]||[]).forEach(function(x){var nl=(lay[n]||0)+1;if(lay[x]===undefined||lay[x]<nl){lay[x]=nl;q.push(x)}})}
  var mL=0,na=[...nodes];for(var k in lay)if(lay[k]>mL)mL=lay[k];
  var lN={};na.forEach(function(n){var l=lay[n]||0;if(!lN[l])lN[l]=[];lN[l].push(n)});
  var W=110,H=30,gx=28,gy=48,pos={};
  for(var l=0;l<=mL;l++){var ns=lN[l]||[];var tw=ns.length*W+(ns.length-1)*gx;var sx=-tw/2;ns.forEach(function(n,i){pos[n]={x:sx+i*(W+gx)+W/2,y:l*(H+gy)+H/2+24}})}
  var mNL=1;for(var k in lN)if(lN[k].length>mNL)mNL=lN[k].length;
  var sw=Math.max(520,mNL*(W+gx)+120),sh=(mL+1)*(H+gy)+52,ox=sw/2;
  var s='<div class="dag"><svg width="'+sw+'" height="'+sh+'" style="display:block"><defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="var(--td)" stroke-width="1.5"/></marker><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="var(--bl)" stroke-width="1.5"/></marker></defs>';
  edges.forEach(function(e){var p1=pos[e.f],p2=pos[e.t];if(!p1||!p2)return;s+='<line x1="'+(p1.x+ox)+'" y1="'+(p1.y+H/2)+'" x2="'+(p2.x+ox)+'" y2="'+(p2.y-H/2)+'" stroke="'+(e.m?'var(--td)':'var(--bl)')+'" stroke-width="'+(e.m?1.2:.8)+'" '+(e.m?'':'stroke-dasharray="4 3"')+' marker-end="'+(e.m?'url(#a1)':'url(#a2)')+'" opacity=".5"/>'});
  na.forEach(function(n){var p=pos[n];if(!p)return;var iC=cIds.has(n),iE=n==='END';var bg=iC?'#1a2340':iE?'#1a3020':'#151720';var br=iC?'#3a5090':iE?'var(--ok)':nc(bi(n));var tc=iC?'#8ab4f8':iE?'var(--ok)':nc(bi(n));var lb=n.length>12?n.slice(0,11)+'..':n;
    s+='<rect x="'+(p.x+ox-W/2)+'" y="'+(p.y-H/2)+'" width="'+W+'" height="'+H+'" rx="'+(iE?13:5)+'" fill="'+bg+'" stroke="'+br+'" stroke-width=".8"/><text x="'+(p.x+ox)+'" y="'+(p.y+1)+'" text-anchor="middle" dominant-baseline="central" fill="'+tc+'" font-size="11" font-family="Pretendard,sans-serif" font-weight="600">'+lb+'</text>'});
  s+='</svg></div>';return s}

/* Tip helpers */
function mT(id,lb){var b=bi(id),n=nMap[b],c=nc(b);return n?'<span class="tw"><span style="color:'+c+';cursor:pointer;font-weight:700">'+lb+'</span><span class="tp"><b style="color:'+c+'">'+b+'</b><br>'+rm(n.statement)+'</span></span>':'<span style="color:'+c+';font-weight:700">'+lb+'</span>'}
function mF(id){var b=bi(id),n=nMap[b],c=nc(b);return n?'<span class="tw"><span style="color:'+c+';cursor:pointer">'+id+'</span><span class="tp"><b style="color:'+c+'">'+b+'</b><br>'+rm(n.statement)+'</span></span>':'<span style="color:var(--td)">'+id+'</span>'}

/* Tab 2: Skeleton */
function rSk(p){if(!p.skeleton||!p.skeleton.length)return'<div class="empty">no skeleton</div>';var h='';for(var i=0;i<p.skeleton.length;i++){var e=p.skeleton[i];var fs=Array.isArray(e.from)?e.from:[e.from];var b=bi(e.to);var iS=e.main===false;var c=nc(b);var fp=[];for(var j=0;j<fs.length;j++)fp.push(mF(fs[j]));h+='<div class="er'+(iS?' side':'')+'" style="border-left:3px solid '+c+'"><div class="eh"><span style="color:var(--td);font-weight:600;min-width:22px">#'+(i+1)+'</span>'+fp.join(' <span style="color:var(--td)">+</span> ')+' <span style="color:var(--td)">\u2192</span> '+mT(e.to,e.to)+(iS?' <span class="es">side</span>':'')+'</div>'+(e.note?'<div class="en">'+rm(e.note)+'</div>':'')+'</div>'}return h}

/* Tab 3: Solution */
function rSo(p){if(!p.solution)return'<div class="empty">no solution</div>';var h='<div class="cd">';p.solution.split('\n').forEach(function(l){h+=(/^STEP\s+\d/.test(l)?'<div style="margin-top:14px;margin-bottom:4px;font-weight:800;font-size:15px;color:var(--ac)">':'<div style="font-size:14px;line-height:2">')+rm(l)+'</div>'});return h+'</div>'}

/* Tab 4: Neurons used */
function rNu(p){if(!p.skeleton)return'<div class="empty">no skeleton</div>';var us={};p.skeleton.forEach(function(e){var b=bi(e.to);if(b&&b!=='END'&&!b.startsWith('\ub2e8\uc11c'))us[b]=true});var used=Object.keys(us);
  var gs=[{l:'FACT',it:used.filter(function(n){return n.startsWith('\uc0ac\uc2e4')}).sort(),c:'var(--fc)'},{l:'OP',it:used.filter(function(n){return n.startsWith('\uc5f0\uc0b0')}).sort(),c:'var(--op)'},{l:'STRAT',it:used.filter(function(n){return n.startsWith('\uc804\ub7b5')}).sort(),c:'var(--st)'}];
  var h='';gs.forEach(function(g){if(!g.it.length)return;h+='<div class="ng"><div class="ngl" style="color:'+g.c+'">'+g.l+' ('+g.it.length+')</div>';g.it.forEach(function(id){var n=nMap[id];var cnt=p.skeleton.filter(function(e){return bi(e.to)===id}).length;h+='<div class="nr"><span class="ni" style="color:'+g.c+'">'+id+'</span><span class="ns">'+(n?rm(n.statement):'?')+'</span>'+(cnt>1?'<span class="nc">x'+cnt+'</span>':'')+'</div>'});h+='</div>'});
  return h+'<div style="font-size:12px;color:var(--td);margin-top:8px">'+used.length+' neurons / '+(p.skeleton||[]).length+' edges</div>'}

/* Tab 5: All neurons */
function rNlib(){
  var fa=[],op=[],st=[];nAll.forEach(function(n){if(n.type==='fact')fa.push(n);else if(n.type==='op')op.push(n);else if(n.type==='strat')st.push(n)});
  var uc={},up={};probs.forEach(function(p){(p.skeleton||[]).forEach(function(e){var b=bi(e.to);if(b&&b!=='END'&&!b.startsWith('\ub2e8\uc11c')){uc[b]=(uc[b]||0)+1;if(!up[b])up[b]={};up[b][p.problem_id]=true}})});

  var h='<div style="margin-bottom:14px;font-size:20px;font-weight:800;color:var(--tb)">Neurons <span style="font-size:13px;color:var(--td)">'+nAll.length+'</span></div><input class="nlib-search" placeholder="search..." value="'+nlQ+'" oninput="nlQ=this.value;rCon()">';
  [{l:'FACT',it:fil(fa),c:'var(--fc)',t:fa.length},{l:'OP',it:fil(op),c:'var(--op)',t:op.length},{l:'STRAT',it:fil(st),c:'var(--st)',t:st.length}].forEach(function(g){if(!g.it.length)return;h+='<div class="ng"><div class="ngl" style="color:'+g.c+'">'+g.l+' ('+(q?g.it.length+'/'+g.t:g.t)+')</div>';g.it.forEach(function(n){var u=up[n.id]?Object.keys(up[n.id]):[];h+='<div class="nr"><span class="ni" style="color:'+g.c+'">'+n.id+'</span><span class="ns">'+rm(n.statement)+'</span>'+(uc[n.id]?'<span class="nc">'+uc[n.id]+'x</span>':'')+'</div>'+(u.length?'<div style="padding-left:60px;font-size:10px;color:var(--td);margin-bottom:3px">'+u.map(function(pid){return'<span style="cursor:pointer;color:var(--ac);text-decoration:underline" onclick="sel=probs.find(function(p){return p.problem_id===\''+pid+'\'});curT=0;rList();rTabs();rCon()">'+pid+'</span>'}).join(' ')+'</div>':'')});h+='</div>'});return h}

/* Tab 6: History */
function rHi(p){if(!p.history||!p.history.length)return'<div class="empty">no history</div>';var h='<div class="sl">'+p.history.length+' versions</div>';[...p.history].reverse().forEach(function(v,ri){var oi=p.history.length-1-ri;var vn=oi+1;var ex=exH[oi];
  h+='<div class="hc"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700;color:var(--td)">v'+vn+' <span style="font-size:11px;font-weight:400">e:'+(v.skeleton||[]).length+'</span></span><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--td)">'+(v.created_at?new Date(v.created_at).toLocaleString('ko-KR'):'')+'</span><span class="ht" onclick="exH['+oi+']=!exH['+oi+'];rCon()">'+(ex?'hide':'show')+'</span></div></div>';
  if(ex&&v.skeleton){h+='<div style="margin-top:8px;max-height:280px;overflow-y:auto">';v.skeleton.forEach(function(e,j){var fs=Array.isArray(e.from)?e.from:[e.from];var c=nc(bi(e.to));var iS=e.main===false;h+='<div class="er'+(iS?' side':'')+'" style="border-left:2px solid '+c+';padding:4px 9px"><span style="font-size:10px;color:var(--td)">#'+(j+1)+' '+fs.join('+')+' -> </span><span style="font-size:11px;color:'+c+';font-weight:700">'+e.to+'</span>'+(e.note?'<div style="font-size:11px;padding-left:18px">'+rm(e.note)+'</div>':'')+'</div>'});h+='</div>'}
  h+='</div>'});return h}

/* Tab 7: Manage */
function rMg(p){

  var h='<div class="sl">Info</div><div class="cd">';

  (p.clues||[]).forEach(function(c,i){h+='<div class="mg-row" style="margin-bottom:4px"><input class="mg-input" style="max-width:60px" id="mg-ci-'+i+'" value="'+c.id+'"><input class="mg-input" id="mg-ct-'+i+'" value="'+(c.text||'').replace(/"/g,'&quot;')+'"><button class="mg-btn mg-btn-d" style="padding:3px 7px;font-size:10px" onclick="rmCl('+i+')">x</button></div>'});
  h+='</div>';
  h+='<div class="sl" style="margin-top:14px">Skeleton <button class="mg-btn mg-btn-s" onclick="fmtSk()" style="padding:4px 8px;margin-left:8px;font-size:11px">format</button></div><div class="cd"><textarea class="reg-input" id="mg-sk" style="min-height:180px;font-family:monospace;font-size:12px">'+JSON.stringify(p.skeleton||[],null,2).replace(/</g,'&lt;')+'</textarea></div>';
  h+='<div class="sl" style="margin-top:14px">Solution</div><div class="cd"><textarea class="reg-input" id="mg-sol" style="min-height:140px">'+(p.solution||'').replace(/</g,'&lt;')+'</textarea></div>';
  h+='<div class="sl" style="margin-top:14px">Analysis</div><div class="cd"><textarea class="reg-input" id="mg-ana" style="min-height:140px">'+(p.analysis||'').replace(/</g,'&lt;')+'</textarea></div>';
  h+='<div style="display:flex;gap:10px;margin-top:16px;position:sticky;bottom:0;background:var(--bg);padding:10px 0;border-top:1px solid var(--bd)"><button class="mg-btn mg-btn-p" id="mg-sv" onclick="saveMg()">Save</button><button class="mg-btn mg-btn-s" onclick="prevMg()">Preview</button><button class="mg-btn mg-btn-d" onclick="delProb()">Delete</button></div><div id="mg-st"></div>';
  return h}

function addTag(){var v=document.getElementById('mg-nt').value.trim();if(!v||!sel)return;if(!sel.tags)sel.tags=tg(sel);if(!sel.tags.custom)sel.tags.custom=[];if(sel.tags.custom.indexOf(v)<0)sel.tags.custom.push(v);rCon()}
function rmTag(i){if(!sel||!sel.tags||!sel.tags.custom)return;sel.tags.custom.splice(i,1);rCon()}
function addCl(){if(!sel)return;if(!sel.clues)sel.clues=[];sel.clues.push({id:'clue'+String.fromCharCode(65+sel.clues.length),text:''});rCon()}
function rmCl(i){if(!sel||!sel.clues)return;sel.clues.splice(i,1);rCon()}
function fmtSk(){var el=document.getElementById('mg-sk');try{el.value=JSON.stringify(JSON.parse(el.value),null,2)}catch(e){sMg('JSON error: '+e.message,false)}}

function readMg(){
  var cls=[];var i=0;while(true){var a=document.getElementById('mg-ci-'+i),b=document.getElementById('mg-ct-'+i);if(!a||!b)break;if(a.value.trim())cls.push({id:a.value.trim(),text:b.value.trim()});i++}
  var sk;try{sk=JSON.parse(document.getElementById('mg-sk').value)}catch(e){return{err:'Skeleton: '+e.message}}
  return{pid:document.getElementById('mg-pid').value.trim(),ans:document.getElementById('mg-ans').value.trim(),src:document.getElementById('mg-src').value.trim(),thm:document.getElementById('mg-theme').value.trim(),dif:document.getElementById('mg-diff').value.trim(),stmt:document.getElementById('mg-stmt').value,cls:cls,sk:sk,sol:document.getElementById('mg-sol').value,ana:document.getElementById('mg-ana').value}}

function prevMg(){var d=readMg();if(d.err){sMg(d.err,false);return}sel.statement=d.stmt;sel.clues=d.cls;sel.skeleton=d.sk;sel.solution=d.sol;sel.analysis=d.ana;sel.answer=d.ans;curT=0;rTabs();rCon()}

async function saveMg(){
  if(!ghTk){sMg('Set token in register tab',false);return}
  var d=readMg();if(d.err){sMg(d.err,false);return}if(!d.pid){sMg('ID required',false);return}
  document.getElementById('mg-sv').disabled=true;
  if(!sel.history)sel.history=[];
  sel.history.push({skeleton:sel.skeleton,solution:sel.solution,analysis:sel.analysis,statement:sel.statement,answer:sel.answer,edge_count:(sel.skeleton||[]).length,created_at:sel.created_at||new Date().toISOString()});
  var old=sel.problem_id;sel.problem_id=d.pid;sel.answer=d.ans;sel.statement=d.stmt;sel.clues=d.cls;sel.skeleton=d.sk;sel.solution=d.sol;sel.analysis=d.ana;sel.created_at=new Date().toISOString();
  if(!sel.metadata)sel.metadata={};sel.metadata.source=d.src;sel.metadata.unit=d.thm;sel.metadata.difficulty=d.dif;
  if(!sel.tags)sel.tags={};sel.tags.source=d.src;sel.tags.theme=d.thm;sel.tags.difficulty=d.dif;
  try{await saveBS('edit: '+old+(old!==d.pid?' -> '+d.pid:''));sMg('Saved! (v'+(sel.history.length+1)+')',true);rList();rTabs()}catch(e){sMg(e.message,false)}
  document.getElementById('mg-sv').disabled=false}

async function delProb(){if(!sel||!ghTk||!confirm('Delete '+sel.problem_id+'?'))return;var idx=probs.indexOf(sel);if(idx>=0)probs.splice(idx,1);try{await saveBS('delete: '+sel.problem_id);sel=probs.length?probs[0]:null;rList();rTabs();rCon()}catch(e){alert(e.message)}}
function sMg(m,ok){var el=document.getElementById('mg-st');if(el)el.innerHTML='<div class="reg-status '+(ok?'reg-ok':'reg-err')+'">'+m+'</div>'}

/* Tab 8: Register */
function rReg(){
  var h='<div style="font-size:20px;font-weight:800;color:var(--tb);margin-bottom:14px">Register</div>';
  h+='<div class="sl">GitHub Token</div><input class="reg-token" type="password" id="reg-tk" placeholder="ghp_..." value="'+ghTk+'" onchange="ghTk=this.value;localStorage.setItem(\'gh_token\',ghTk)">';
  h+='<div class="sl" style="margin-top:12px">JSON</div><textarea class="reg-input" id="reg-json" style="min-height:240px;font-family:monospace" placeholder=\'{"problem_id":"D1","skeleton":[...]}\'></textarea>';
  h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="mg-btn mg-btn-s" onclick="valReg()">Validate</button><button class="mg-btn mg-btn-p" id="reg-sub" onclick="subReg()">Register</button></div><div id="reg-st"></div>';
  return h}

function sRS(m,ok){var el=document.getElementById('reg-st');if(el)el.innerHTML='<div class="reg-status '+(ok?'reg-ok':'reg-err')+'">'+m+'</div>'}
function valReg(){var r=document.getElementById('reg-json').value.trim();if(!r){sRS('empty',false);return}try{var d=JSON.parse(r);var e=Array.isArray(d)?d:[d];var er=[];for(var i=0;i<e.length;i++){if(!e[i].problem_id)er.push(i+': no id');if(!e[i].skeleton||!e[i].skeleton.length)er.push(i+': no skeleton');var ex=probs.some(function(x){return x.problem_id===e[i].problem_id});if(ex)er.push(i+': '+e[i].problem_id+' exists (will get suffix)')}if(er.length)sRS(er.join('\n'),false);else sRS('Valid! '+e.length+' items',true)}catch(e){sRS('parse error',false)}}

async function subReg(){
  if(!ghTk){sRS('set token',false);return}
  var r=document.getElementById('reg-json').value.trim();if(!r)return;
  var d;try{d=JSON.parse(r)}catch(e){sRS('parse error',false);return}
  var entries=Array.isArray(d)?d:[d];
  entries.forEach(function(e){if(!e.created_at)e.created_at=new Date().toISOString();if(!e.history)e.history=[];if(!e.tags)e.tags={source:'',theme:'',difficulty:'',custom:[]}});
  document.getElementById('reg-sub').disabled=true;sRS('saving...',true);
  try{var ad=[],rn=[];
    entries.forEach(function(entry){var exists=probs.some(function(x){return x.problem_id===entry.problem_id});if(exists){var base=entry.problem_id;var cnt=probs.filter(function(x){return x.problem_id.startsWith(base)}).length;var nid=base+'_'+(cnt+1);rn.push(base+'->'+nid);entry.problem_id=nid}probs.push(entry);ad.push(entry.problem_id)});
    await saveBS('register: '+ad.join(', '));
    var msg='Done! +'+ad.length;if(rn.length)msg+=' renamed:'+rn.join(',');msg+=' total:'+probs.length;
    sRS(msg,true);rList();rTabs();document.getElementById('reg-json').value=''}catch(e){sRS(e.message,false)}
  document.getElementById('reg-sub').disabled=false}

/* GitHub Save */
async function saveBS(msg){
  var api='https://api.github.com/repos/'+OW+'/'+RP+'/contents/bookshelf.json?ref='+BR;
  var res=await fetch(api,{headers:{'Authorization':'token '+ghTk}});if(!res.ok)throw new Error('read:'+res.status);
  var g=await res.json();bsSha=g.sha;
  var nc=btoa(unescape(encodeURIComponent(JSON.stringify(probs,null,2))));
  var pr=await fetch(api,{method:'PUT',headers:{'Authorization':'token '+ghTk,'Content-Type':'application/json'},body:JSON.stringify({message:msg,content:nc,sha:bsSha,branch:BR})});
  if(!pr.ok)throw new Error('save:'+pr.status);bsSha=(await pr.json()).content.sha}

load();
</script>
