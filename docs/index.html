<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Math Skeleton Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{--bg:#0a0c10;--pn:#0d0f14;--cd:#11131a;--bd:#1a1d2e;--bl:#252940;--ac:#7c83fd;--ab:rgba(124,131,253,.09);--tx:#d8dce8;--td:#7a7f9a;--tb:#f0f2ff;--fc:#4fc3f7;--op:#ffd54f;--st:#ef5350;--ok:#66bb6a;--wn:#ffa726}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard',-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.sb{width:300px;min-width:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-hd{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}.sb-hd .lb{font-size:11px;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:2px}.sb-hd .tt{font-size:20px;font-weight:800;color:var(--tb)}.sb-hd .mt{font-size:12px;color:var(--td);margin-top:4px}
.vw-bar{display:flex;gap:0;padding:5px 8px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.vw-btn{padding:5px 9px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:11px;color:var(--td);border-radius:4px;white-space:nowrap}.vw-btn:hover{color:var(--tx)}.vw-btn.on{background:var(--ab);color:var(--ac);font-weight:700}
.sb-sr{padding:5px 8px;flex-shrink:0}.sb-sr input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.sb-ls{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 6px;position:relative;user-select:none}
.flt-panel{border-bottom:1px solid var(--bd);flex-shrink:0;padding:6px 8px}
.flt-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap}.flt-row:last-child{margin-bottom:0}
.flt-label{font-size:10px;color:var(--td);font-weight:700;min-width:30px;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.flt-chips{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.flt-chip{font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid var(--bd);background:var(--pn);color:var(--td);white-space:nowrap;transition:all .1s}.flt-chip:hover{border-color:var(--ac);color:var(--tx)}.flt-chip.on{background:var(--ab);border-color:var(--ac);color:var(--ac);font-weight:700}
.flt-active{display:flex;gap:4px;flex-wrap:wrap;padding:4px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.flt-atag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--ac);color:#fff;display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-weight:600}.flt-atag:hover{opacity:.8}
.flt-clear{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bl);color:var(--td);cursor:pointer;font-weight:600}.flt-clear:hover{color:var(--tx)}
.flt-toggle{font-size:11px;color:var(--td);cursor:pointer;padding:2px 6px;display:flex;align-items:center;gap:4px;flex-shrink:0}.flt-toggle:hover{color:var(--ac)}
.flt-count{font-size:10px;color:var(--td)}
.lasso{position:absolute;border:1.5px solid rgba(124,131,253,.7);background:rgba(124,131,253,.1);pointer-events:none;z-index:10;border-radius:2px;box-shadow:0 0 8px rgba(124,131,253,.15)}
.bulk{padding:8px 10px;background:linear-gradient(180deg,rgba(124,131,253,.95),rgba(100,106,220,.95));font-size:11px;color:#fff;font-weight:700;flex-shrink:0;border-top:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px)}
.bulk button{padding:4px 8px;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.2);color:#fff;white-space:nowrap;flex-shrink:0}.bulk button:hover{background:rgba(255,255,255,.35)}
.bulk select{padding:3px 6px;border:none;border-radius:4px;font-size:10px;background:rgba(255,255,255,.2);color:#fff;font-family:inherit;flex-shrink:0;min-width:0;max-width:90px}
.bulk-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;min-width:0;flex-wrap:wrap}.bulk-row:last-child{margin-bottom:0}
.bulk-input{padding:3px 6px;border:none;border-radius:3px;font-size:10px;background:rgba(255,255,255,.18);color:#fff;font-family:inherit;outline:none;flex:1;min-width:30px}.bulk-input::placeholder{color:rgba(255,255,255,.5)}
.bulk-label{font-size:10px;flex-shrink:0;opacity:.85}
.bulk-count{font-size:12px;font-weight:800;margin-right:4px}
.pi.cut-mark{opacity:.4;border-left-color:var(--wn)!important}
.fl{font-size:13px;font-weight:700;color:var(--td);padding:7px 8px 3px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:5px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fl:hover{color:var(--ac)}.fl-drop{background:var(--ab);outline:1.5px dashed var(--ac);outline-offset:-2px}
.fl-rename,.pi-rename{background:var(--pn);border:1px solid var(--ac);border-radius:4px;padding:2px 6px;color:var(--tx);font-size:13px;font-weight:600;font-family:inherit;outline:none;min-width:0}
.fl-rename{font-weight:700;width:120px}.pi-rename{flex:1}
.pi{padding:5px 10px 5px 16px;border-radius:5px;cursor:default;margin-bottom:1px;border-left:3px solid transparent;transition:background .08s;font-size:13px;display:flex;align-items:center;gap:7px;overflow:hidden}
.pi:hover{background:var(--ab)}.pi.on{background:var(--ab);border-left-color:var(--ac)}.pi.sel-m{background:rgba(124,131,253,.18);border-left-color:rgba(124,131,253,.5)}.pi.dragging{opacity:.35;transform:scale(.97)}
.pi[draggable=true]:active{cursor:grabbing}
.pi .cb{width:13px;height:13px;accent-color:var(--ac);cursor:pointer;flex-shrink:0;opacity:0;transition:opacity .1s}
.pi:hover .cb,.pi.sel-m .cb,.pi.on .cb{opacity:1}
.pi .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default}.pi.on .nm{font-weight:700;color:var(--ac)}.pi .inf{font-size:10px;color:var(--td);flex-shrink:0}
.mn{flex:1;display:flex;flex-direction:column;min-width:0}
.tb-bar{display:flex;border-bottom:1px solid var(--bd);background:var(--pn);padding:0 12px;overflow-x:auto;flex-shrink:0}
.tb{padding:10px 12px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:13px;color:var(--td);border-bottom:2px solid transparent;white-space:nowrap}.tb:hover{color:var(--tx)}.tb.on{color:var(--ac);font-weight:700;border-bottom-color:var(--ac)}
.ct{flex:1;overflow:auto;padding:18px 22px;min-width:0}
.cd{background:var(--cd);border-radius:8px;padding:16px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.sl{font-size:12px;font-weight:700;color:var(--td);letter-spacing:2px;margin-bottom:7px;text-transform:uppercase}
.bg{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}.badge{font-size:11px;padding:3px 7px;border-radius:4px}
.b-u{background:var(--ab);color:var(--ac)}.b-d{background:rgba(255,167,38,.1);color:var(--wn)}.b-a{background:rgba(102,187,106,.1);color:var(--ok)}.b-e{background:rgba(79,195,247,.1);color:var(--fc)}.b-v{background:rgba(124,131,253,.1);color:var(--ac)}.b-t{background:rgba(124,131,253,.06);color:var(--td)}
.er{padding:7px 11px;border-radius:5px;background:var(--cd);margin-bottom:3px;overflow:hidden}.er.side{opacity:.6;background:rgba(26,29,46,.5)}
.eh{display:flex;align-items:center;gap:6px;font-size:13px;flex-wrap:wrap}
.en{font-size:13px;color:var(--tx);margin-top:3px;padding-left:26px;line-height:1.6;overflow-wrap:break-word;word-break:break-word}
.es{font-size:10px;color:var(--wn);border:1px solid rgba(255,167,38,.3);border-radius:4px;padding:2px 6px}
.tw{position:relative;display:inline}.tw .tp{display:none;position:fixed;background:#1e2235;border:1px solid var(--bl);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--tx);white-space:normal;width:max-content;max-width:420px;z-index:999;line-height:1.5;box-shadow:0 4px 14px rgba(0,0,0,.6);pointer-events:none}.tw:hover .tp{display:block}
.ng{margin-bottom:14px}.ngl{font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.nr{display:flex;gap:10px;padding:6px 11px;background:var(--cd);border-radius:5px;border:1px solid var(--bd);margin-bottom:3px;align-items:flex-start;overflow:hidden}
.ni{font-size:13px;font-weight:700;min-width:50px;flex-shrink:0}.ns{font-size:13px;flex:1;min-width:0;overflow-wrap:break-word}.nc{font-size:10px;color:var(--td);background:var(--bd);border-radius:4px;padding:2px 6px;flex-shrink:0}
.dag{overflow:auto;max-height:500px;background:var(--bg);border-radius:8px;border:1px solid var(--bd)}
.hc{background:var(--cd);border-radius:8px;padding:12px;border:1px solid var(--bd);margin-bottom:8px}
.ht{font-size:11px;color:var(--ac);cursor:pointer;background:var(--ab);border:1px solid rgba(124,131,253,.2);border-radius:4px;padding:3px 7px}
.mg-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}.mg-label{font-size:13px;color:var(--td);min-width:80px}
.mg-input{flex:1;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;min-width:0}
.mg-tag{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--ab);color:var(--ac);display:inline-flex;align-items:center;gap:4px}
.mg-tag-x{cursor:pointer;font-weight:700;opacity:.6}.mg-tag-x:hover{opacity:1}
.mg-btn{padding:7px 14px;border:none;border-radius:5px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.mg-btn-p{background:var(--ac);color:#fff}.mg-btn-s{background:var(--bl);color:var(--tx)}.mg-btn-d{background:#3a1515;color:var(--st)}.mg-btn:disabled{opacity:.4;cursor:not-allowed}
.reg-input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;resize:vertical;min-height:80px}
.reg-token{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px}
.reg-status{font-size:12px;padding:7px 10px;border-radius:5px;margin-top:7px}.reg-ok{background:rgba(102,187,106,.1);color:var(--ok);border:1px solid rgba(102,187,106,.2)}.reg-err{background:rgba(239,83,80,.1);color:var(--st);border:1px solid rgba(239,83,80,.2)}
.nlib-search{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px}
.empty{color:var(--td);font-size:14px;text-align:center;margin-top:60px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
.drag-ghost{position:fixed;pointer-events:none;z-index:1000;background:var(--cd);border:1px solid var(--ac);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--ac);font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.5);opacity:.92}
.ctx-menu{position:fixed;z-index:2000;background:#1a1e2e;border:1px solid var(--bl);border-radius:6px;padding:4px 0;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.6);font-size:13px}
.ctx-item{padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--tx)}.ctx-item:hover{background:var(--ab)}.ctx-item.disabled{opacity:.35;pointer-events:none}
.ctx-key{margin-left:auto;font-size:10px;color:var(--td);font-weight:600}.ctx-sep{height:1px;background:var(--bd);margin:4px 0}
.katex-display{overflow-x:auto;overflow-y:hidden}.katex{white-space:normal}
.diff-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}
.diff-1{background:rgba(239,83,80,.2);color:var(--st)}
.diff-2{background:rgba(255,167,38,.2);color:var(--wn)}
.diff-3{background:rgba(255,213,79,.15);color:#ffd54f}
.diff-4{background:rgba(102,187,106,.15);color:var(--ok)}
.diff-5{background:rgba(79,195,247,.15);color:var(--fc)}
</style>
</head>
<body>
<div class="sb"><div class="sb-hd"><div class="lb">Skeleton</div><div class="tt">Viewer</div><div class="mt" id="meta">loading...</div></div><div class="vw-bar" id="vwbar"></div><div class="sb-sr"><input id="sq" placeholder="search..." oninput="rList()"></div><div id="fltpanel"></div><div id="fltactive"></div><div class="sb-ls" id="slist"></div><div id="bulkbar"></div></div>
<div class="mn"><div class="tb-bar" id="tbar"></div><div class="ct" id="ct"><div class="empty">select a problem</div></div></div>
<div class="ctx-menu" id="ctxmenu" style="display:none"></div>
<script>
var OW='koms7429-maker',RP='math-hub',BR='main';
// TABS: 0=Problem, 1=Analysis, 2=Solution, 3=DAG, 4=Skeleton, 5=DNA, 6=all neurons, 7=all DNAs, 8=history, 9=manage, 10=register
var TABS=['Problem','Analysis','Solution','DAG','Skeleton','DNA','all neurons','all DNAs','history','manage','register'];
var VW=['All','Source','Theme','Difficulty','Folder'];
var probs=[],nMap={},nAll=[],dnaMap={},sel=null,curT=0,curV=0,exH={},nlQ='',ghTk='',bsSha='',adjData=null,probShas={},indexSha='',indexData=null;
var multiSel=new Set(),collapsed={},dragPid=null,dragFolder=null;
var folderParent={};try{var _fp=localStorage.getItem('folderParent');if(_fp)folderParent=JSON.parse(_fp)}catch(e){}
function saveFP(){localStorage.setItem('folderParent',JSON.stringify(folderParent))}
var flt={src:new Set(),thm:new Set(),dif:new Set(),fld:new Set()},fltOpen=true;
var clipboard={pids:[],mode:null},currentFolder=null,renaming=null,lassoActive=false,lassoStart=null,lassoEl=null;

function d64(b){return new TextDecoder('utf-8').decode(Uint8Array.from(atob(b.replace(/\s/g,'')),function(c){return c.charCodeAt(0)}))}
function rm(t){if(!t)return'';return String(t).split(/(\$[^$]+\$)/g).map(function(p){if(p.startsWith('$')&&p.endsWith('$')){try{return katex.renderToString(p.slice(1,-1),{throwOnError:false})}catch(e){return'<code>'+p.slice(1,-1)+'</code>'}}return p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}).join('')}
function nc(id){if(!id)return'var(--td)';if(id.startsWith('\uc0ac\uc2e4'))return'var(--fc)';if(id.startsWith('\uc5f0\uc0b0'))return'var(--op)';if(id.startsWith('\uc804\ub7b5'))return'var(--st)';return'var(--td)'}
function bi(to){return to?to.replace(/_\d+$/,''):''}
function gn(e){return e.neuron||e.to||''}
function buildNoteMap(sk){var m={};if(!sk)return m;sk.forEach(function(e){if(e.to&&e.to!=='END'){m[e.to]={note:e.note||'',neuron:gn(e)}}});return m}
function nTy(id){if(id.startsWith('\uc0ac\uc2e4'))return'fact';if(id.startsWith('\uc5f0\uc0b0'))return'op';if(id.startsWith('\uc804\ub7b5'))return'strat';return''}
function pNL(l){var m=l.match(/^\|\s*((?:\uc0ac\uc2e4|\uc5f0\uc0b0|\uc804\ub7b5)\d+)\s*\|\s*(.*)\s*$/);if(m){var s=m[2].replace(/\|\s*$/,'').trim();if(s)return{id:m[1],statement:s}}return null}
function pDL(l){var m=l.match(/^\|\s*([A-Z]\d+)\s*\|\s*([^|]+)\|\s*([^|]*)\|\s*([^|]*)\|?\s*$/);if(m){return{id:m[1].trim(),name:m[2].trim(),signature:m[3].trim(),description:m[4].trim()}}return null}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function natCmp(a,b){return a.replace(/(\d+)/g,function(m){return m.padStart(8,'0')}).localeCompare(b.replace(/(\d+)/g,function(m){return m.padStart(8,'0')}))}
function tg(p){return{source:(p.metadata&&p.metadata.source)||(p.tags&&p.tags.source)||'',theme:(p.metadata&&p.metadata.unit)||(p.tags&&p.tags.theme)||'',difficulty:(p.metadata&&p.metadata.difficulty)||(p.tags&&p.tags.difficulty)||'',custom:(p.tags&&p.tags.custom)||[]}}
function splitField(v){if(!v)return[];return v.split(/[,;，]/).map(function(s){return s.trim()}).filter(Boolean)}
function allVals(dim){var s=new Set();probs.forEach(function(p){var t=tg(p);if(dim==='src')splitField(t.source).forEach(function(v){s.add(v)});else if(dim==='thm')splitField(t.theme).forEach(function(v){s.add(v)});else if(dim==='dif')splitField(t.difficulty).forEach(function(v){s.add(v)});else if(dim==='fld')(t.custom||[]).forEach(function(v){s.add(v)})});return[...s].sort()}
function allFolders(){return allVals('fld')}

function applyFilter(list){return list.filter(function(p){var t=tg(p);if(flt.src.size){var pv=splitField(t.source);if(!pv.some(function(v){return flt.src.has(v)}))return false}if(flt.thm.size){var pv=splitField(t.theme);if(!pv.some(function(v){return flt.thm.has(v)}))return false}if(flt.dif.size){var pv=splitField(t.difficulty);if(!pv.some(function(v){return flt.dif.has(v)}))return false}if(flt.fld.size){var pv=t.custom||[];if(!pv.some(function(v){return flt.fld.has(v)}))return false}return true})}
function hasAF(){return flt.src.size||flt.thm.size||flt.dif.size||flt.fld.size}
function toggleFlt(dim,val){if(flt[dim].has(val))flt[dim].delete(val);else flt[dim].add(val);rFilter();rList()}
function clearFlt(){flt={src:new Set(),thm:new Set(),dif:new Set(),fld:new Set()};rFilter();rList()}
function removeFlt(dim,val){flt[dim].delete(val);rFilter();rList()}

function rFilter(){var panel=document.getElementById('fltpanel'),active=document.getElementById('fltactive');if(hasAF()){var ah='<div class="flt-active">';[['src','Src'],['thm','Thm'],['dif','Dif'],['fld','Fld']].forEach(function(d){flt[d[0]].forEach(function(v){ah+='<span class="flt-atag" onclick="removeFlt(\''+d[0]+'\',\''+esc(v)+'\')">'+d[1]+':'+v+' \u2715</span>'})});ah+='<span class="flt-clear" onclick="clearFlt()">Clear</span></div>';active.innerHTML=ah}else active.innerHTML='';if(!fltOpen){panel.innerHTML='<div class="flt-panel"><span class="flt-toggle" onclick="fltOpen=true;rFilter()">&#9654; Filter</span></div>';return}var dims=[{key:'src',label:'SRC',vals:allVals('src')},{key:'thm',label:'THM',vals:allVals('thm')},{key:'dif',label:'DIF',vals:allVals('dif')},{key:'fld',label:'FLD',vals:allVals('fld')}];var h='<div class="flt-panel"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span class="flt-toggle" onclick="fltOpen=false;rFilter()">&#9660; Filter</span>';if(hasAF())h+='<span class="flt-count">'+applyFilter(probs).length+'/'+probs.length+'</span>';h+='</div>';dims.forEach(function(d){if(!d.vals.length)return;h+='<div class="flt-row"><span class="flt-label">'+d.label+'</span><div class="flt-chips">';d.vals.forEach(function(v){h+='<span class="flt-chip'+(flt[d.key].has(v)?' on':'')+'" onclick="toggleFlt(\''+d.key+'\',\''+esc(v)+'\')">'+v+'</span>'});h+='</div></div>'});h+='</div>';panel.innerHTML=h}

function diffBadge(score){if(!score&&score!==0)return'';var rank;if(score<=1){rank=score>=0.35?1:score>=0.25?2:score>=0.18?3:score>=0.1?4:5}else{rank=score>=3?1:score>=2?2:score>=1.5?3:score>=1?4:5}var labels=['\ucd5c\uc0c1','\uc0c1','\uc911','\ud558','\ucd5c\ud558'];return'<span class="diff-badge diff-'+rank+'">'+labels[rank-1]+'</span>'}

function normalizeTP(tp){if(!tp||!tp._version)return tp;if(tp._normalized)return tp;
// v6: note 기반 → step 집계 추가
if(tp._version>=6&&tp.notes){
  // toStepMap 없이 note_index로 step 매핑 (main edge 순서 = note 순서)
  // v6는 step 데이터가 없으므로 notes에서 step 집계 생성
  tp._isV6=true;tp._normalized=true;return tp;
}
// v4/v5 호환
if(tp._version<4){tp._normalized=true;return tp;}
var rounds=tp.rounds||[];var steps=tp.steps||[];steps.forEach(function(s){s.match=!!s.consumed;var r=null;if(s.consumed&&s.discovered_in_round){r=rounds.find(function(rd){return rd.round===s.discovered_in_round&&!rd.skipped})}if(!r){var pr=rounds.filter(function(rd){return!rd.skipped&&rd.matched_step_num===s.step_num});if(pr.length)r=pr[0]}s.think_tokens=r?r.think_tokens||0:0;s.elapsed_ms=r?r.elapsed_ms||0:0;s.claude_step=r?r.claude_step||'':'';s.match_score=r?r.match_score||0:s.best_partial_score||0;if(!s.match&&s.partial_hits>0)s.match_score=s.best_partial_score||0});if(tp.hardest_step){var hs=tp.hardest_step;hs.match=!!hs.consumed;var hr=null;if(hs.consumed){var hsi=steps.find(function(s){return s.step_num===hs.step_num});if(hsi){hr=rounds.find(function(rd){return rd.round===hsi.discovered_in_round&&!rd.skipped})}}hs.think_tokens=hr?hr.think_tokens||0:0;hs.elapsed_ms=hr?hr.elapsed_ms||0:0}tp._normalized=true;return tp}

function rAn(p){
  var h='';
  var tcs={'사실':'#4fc3f7','연산':'#ffd54f','전략':'#ef5350'};

  // Step별 풀이
  var sk=p.skeleton||[];
  var stepMap={};
  sk.forEach(function(e){var s=e.step||0;if(!stepMap[s])stepMap[s]=[];stepMap[s].push(e);});
  var sol=p.solution||'';
  var solSteps=sol.split('\n').filter(function(l){return/^STEP\s+\d/.test(l)});
  var stepNums=Object.keys(stepMap).map(Number).filter(function(n){return n>0}).sort(function(a,b){return a-b});

  if(stepNums.length>0){
    h+='<div class="sl">Step Analysis</div>';
    stepNums.forEach(function(sn){
      var edges=stepMap[sn];
      var mainEdges=edges.filter(function(e){return e.main!==false});
      var sideEdges=edges.filter(function(e){return e.main===false});
      var stepText=solSteps[sn-1]||('STEP '+sn);
      // thinking profile 데이터에서 해당 step 찾기
      var tp=p.thinking_profile;if(tp)tp=normalizeTP(tp);
      var stepData=null;
      var v6Notes=null;
      if(tp&&tp._isV6&&tp.notes){
        // v6: note_index로 이 step에 해당하는 notes 찾기
        v6Notes=tp.notes.filter(function(n){return n.note_index===sn});
        if(v6Notes.length>0){stepData={_v6:true,hint_level:Math.max.apply(null,v6Notes.map(function(n){return n.hint_level})),neuron:v6Notes[0].neuron,structural_difficulty:v6Notes[0].structural_difficulty};}
      } else if(tp&&tp.steps){
        stepData=tp.steps.find(function(s){return s.step_num===sn});
      }
      h+='<div class="cd" style="margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
      h+='<div style="font-size:13px;font-weight:800;color:#7c83fd;flex:1">'+rm(stepText)+'</div>';
      if(stepData&&stepData._v6){
        var hc=hintColor(stepData.hint_level);
        h+='<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">';
        h+=hintBadge(stepData.hint_level);
        h+='<span style="font-size:9px;color:#7a7f9a">'+stepData.neuron+'</span>';
        if(stepData.structural_difficulty!==undefined)h+=diffBadge(stepData.structural_difficulty);
        h+='</div>';
      } else if(stepData){
        var mc=stepData.match?'#66bb6a':(stepData.partial_hits>0?'#ffa726':'#ef5350');
        var statusLabel=stepData.match?'✓ 발견':(stepData.partial_hits>0?'◐ 부분':'✗ 미발견');
        h+='<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">';
        h+='<span style="font-size:9px;background:'+(stepData.match?'rgba(102,187,106,.15)':(stepData.partial_hits>0?'rgba(255,167,38,.15)':'rgba(239,83,80,.15)'))+';color:'+mc+';padding:2px 6px;border-radius:3px;font-weight:700">'+statusLabel+'</span>';
        if(stepData.think_tokens)h+='<span style="font-size:10px;color:#a78bfa;font-variant-numeric:tabular-nums">'+stepData.think_tokens+'tok</span>';
        if(stepData.difficulty_score!==undefined)h+=diffBadge(stepData.difficulty_score);
        h+='</div>';
      }
      h+='</div>';
      mainEdges.forEach(function(e){
        var fs=Array.isArray(e.from)?e.from:[e.from];
        var c=nc(bi(e.neuron||''));
        h+='<div style="display:flex;gap:6px;font-size:11px;margin-bottom:5px;align-items:flex-start">';
        h+='<span style="color:#7a7f9a;flex-shrink:0;padding-top:1px">'+fs.join('+')+'</span>';
        h+='<span style="color:#7a7f9a;flex-shrink:0">→[</span>';
        h+='<span style="color:'+c+';font-weight:700;flex-shrink:0">'+rm(e.neuron||'')+'</span>';
        h+='<span style="color:#7a7f9a;flex-shrink:0">]→</span>';
        h+='<span style="color:var(--tx);flex:1;line-height:1.6">'+rm(e.note||'')+'</span>';
        h+='</div>';
      });
      if(sideEdges.length){
        h+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)">';
        h+='<div style="font-size:9px;color:#7a7f9a;letter-spacing:2px;margin-bottom:4px">SIDE</div>';
        sideEdges.forEach(function(e){
          var fs=Array.isArray(e.from)?e.from:[e.from];
          var c=nc(bi(e.neuron||''));
          h+='<div style="display:flex;gap:6px;font-size:10px;margin-bottom:3px;opacity:.55;align-items:flex-start">';
          h+='<span style="color:#7a7f9a;flex-shrink:0">'+fs.join('+')+'</span>';

          h+='<span style="color:'+c+';font-weight:700;flex-shrink:0">'+rm(e.neuron||'')+'</span>';
          h+='<span style="color:#7a7f9a;flex-shrink:0">]→</span>';
          h+='<span style="color:var(--tx);flex:1;line-height:1.6">'+rm(e.note||'')+'</span>';

      }

  }

  // ── Solving Flow (key_ideas + solving_flow + structure_type) ──
  if(p.key_ideas&&p.key_ideas.length>0||p.solving_flow){

    var stColors={'linear':'#7a7f9a','single_gate':'#1D9E75','front_gate':'#7F77DD','buildup':'#D85A30','scattered':'#BA7517','mid_gate':'#378ADD'};

      var noteMap={};if(tp2&&tp2.notes)tp2.notes.forEach(function(n){noteMap[n.note_id]=n});
      h+='<div style="font-size:11px;color:#7a7f9a;letter-spacing:2px;margin-bottom:8px">FLOW ('+sf.length+' phases)</div>';
      h+='<div style="display:flex;flex-direction:column;gap:4px;padding-left:14px;border-left:2px solid var(--bd)">';
      sf.forEach(function(phase,pi){
        if(phase.type==='key_idea'){
          var hc=hintColor(phase.hint_level);
          var casc=phase.cascade||[];
          var nt=noteMap[phase.note_id];

function mkSkDAG(sk,clues,sfx){

  s+='<marker id="'+m2+'" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#252940" stroke-width="1.5"/></marker>';

function rDNA(p){var d=p.dna;if(!d||!d.nodes||!d.nodes.length)return'<div class="empty">no DNA data</div>';var ns=d.nodes,es=d.edges||[];var cats={};ns.forEach(function(n){var c=n.category||'기타';if(!cats[c])cats[c]=[];cats[c].push(n)});var catColors={'발문':'var(--st)','수식':'var(--op)','조건':'var(--fc)','제한':'var(--wn)','기하':'var(--ok)','함수':'#ce93d8','존재':'#90caf9','말단':'var(--td)','구조':'var(--ac)','연산':'var(--op)'};var h='<div class="sl">DNA <span style="font-size:11px;font-weight:400;letter-spacing:0">'+ns.length+' nodes / '+es.length+' edges</span></div>';var ck=Object.keys(cats).sort();ck.forEach(function(cat){var items=cats[cat];var cc=catColors[cat]||'var(--td)';h+='<div class="ng"><div class="ngl" style="color:'+cc+'">'+cat+' ('+items.length+')</div>';items.forEach(function(n){var dm=dnaMap[n.dna]||{};h+='<div class="nr" style="flex-wrap:wrap"><span class="ni" style="color:'+cc+';min-width:50px">'+n.dna+'</span><span style="font-size:13px;font-weight:600;color:var(--tx)">'+(dm.name||n.dna)+'</span><span style="font-size:11px;color:var(--td);margin-left:8px">'+rm(dm.signature||'')+'</span></div>';h+='<div style="padding-left:55px;font-size:11px;color:var(--td);margin-bottom:3px">'+rm(n.label||dm.description||'')+'</div>'});h+='</div>'});if(d.new_dna&&d.new_dna.length){h+='<div class="sl" style="margin-top:14px;color:var(--wn)">New DNA Proposed ('+d.new_dna.length+')</div>';d.new_dna.forEach(function(nd){h+='<div class="nr" style="border-color:var(--wn)"><span class="ni" style="color:var(--wn)">'+nd.id+'</span><span class="ns">'+rm(nd.name)+' <span style="color:var(--td)">'+rm(nd.signature||'')+'</span></span></div>';if(nd.reason)h+='<div style="padding-left:70px;font-size:11px;color:var(--td);margin-bottom:4px">'+rm(nd.reason)+'</div>'})}h+='<div class="sl" style="margin-top:14px">DAG</div>';var nById={};ns.forEach(function(n){nById[n.id]=n});var adj={},inD={};ns.forEach(function(n){adj[n.id]=[];inD[n.id]=0});es.forEach(function(e){if(adj[e.from]!==undefined){ad function rNlib(){var fa=[],op=[],st=[];nAll.forEach(function(n){if(n.type==='fact')fa.push(n);else if(n.type==='op')op.push(n);else if(n.type==='strat')st.push(n)});var uc={},up={};probs.forEach(function(p){(p.skeleton||[]).forEach(function(e){var b=bi(gn(e));if(b&&b!=='END'&&!b.startsWith('\ub2e8\uc11c')){uc[b]=(uc[b]||0)+1;if(!up[b])up[b]={};up[b][p.problem_id]=true}})});var q=nlQ.toLowerCase();function fil(l){return q?l.filter(function(n){return n.id.toLowerCase().indexOf(q)>=0||n.statement.toLowerCase().indexOf(q)>=0}):l}var h='<div style="margin-bottom:12px;font-size:20px;font-weight:800;color:var(--tb)">Neurons <span style="font-size:13px;color:var(--td)">'+nAll.length+'</span></div><input class="nlib-search" placeholder="search..." value="'+nlQ+'" oninput="nlQ=this.value;rCon()">';[{l:'FACT',it:fil(fa),c:'var(--fc)',t:fa.length},{l:'OP',it:fil(op),c:'var(--op)',t:op.length},{l:'STRAT',it:fil(st),c:'var(--st)',t:st.length}].forEach(function(g){if(!g.it.length)return;h+='<div class="ng"><div class="ngl" style="color:'+g.c+'">'+g.l+' ('+(q?g.it.length+'/'+g.t:g.t)+')</div>';g.it.forEach(function(n){var u=up[n.id]?Object.keys(up[n.id]):[];h+='<div class="nr"><span class="ni" style="color:'+g.c+'">'+n.id+'</span><span class="ns">'+rm(n.statement)+'</span>'+(uc[n.id]?'<span class="nc">'+uc[n.id]+'x</span>':'')+'</div>'+(u.length?'<div style="padding-left:58px;font-size:10px;color:var(--td);margin-bottom:3px">'+u.map(function(pid){return'<span style="cursor:pointer;color:var(--ac);text-decoration:underline" onclick="sel=probs.find(function(p){return p.problem_id===\''+pid+'\'});curT=0;rList();rTabs();rCon()">'+pid+'</span>'}).join(' ')+'</div>':'')});h+='</div>'});return h}

function rDNAlib(){var catColors={'발문':'var(--st)','수식':'var(--op)','조건':'var(--fc)','제한':'var(--wn)','기하':'var(--ok)','함수':'#ce93d8','존재':'#90caf9','말단':'var(--td)','구조':'var(--ac)','연산':'var(--op)'};var allDna={},dnaProbs={};probs.forEach(function(p){var d=p.dna;if(!d||!d.nodes)return;d.nodes.forEach(function(n){if(!allDna[n.dna]){allDna[n.dna]={id:n.dna,category:n.category||'기타',count:0}}allDna[n.dna].count++;if(!dnaProbs[n.dna])dnaProbs[n.dna]={};dnaProbs[n.dna][p.problem_id]=true})});Object.keys(dnaMap).forEach(function(id){if(!allDna[id])allDna[id]={id:id,category:'기타',count:0}});var all=Object.values(allDna);if(!all.length)return'<div class="empty">no DNA data</div>';var cats={};all.forEach(function(d){var dm=dnaMap[d.id];var c=dm?catByPrefix(d.id):d.category;if(!cats[c])cats[c]=[];cats[c].push(d)});var total=Object.keys(dnaMap).length||all.length;var h='<div style="margin-bottom:12px;font-size:20px;font-weight:800;color:var(--tb)">All DNAs <span style="font-size:13px;color:var(--td)">'+total+' types</span></div><input class="nlib-search" placeholder="search DNA..." oninput="rCon()">';var q=(document.querySelector('.nlib-search')||{}).value||'';q=q.toLowerCase();Object.keys(cats).sort().forEach(function(cat){var items=cats[cat];if(q)items=items.filter(function(d){var dm=dnaMap[d.id]||{};return d.id.toLowerCase().indexOf(q)>=0||(dm.name||'').toLowerCase().indexOf(q)>=0||(dm.description||'').toLowerCase().indexOf(q)>=0||cat.toLowerCase().indexOf(q)>=0});if(!items.length)return;var cc=catColors[cat]||'var(--td)';h+='<div class="ng"><div class="ngl" style="color:'+cc+'">'+cat+' ('+items.length+')</div>';items.sort(function(a,b){return natCmp(a.id,b.id)}).forEach(function(d){var dm=dnaMap[d.id]||{};var pids=dnaProbs[d.id]?Object.keys(dnaProbs[d.id]):[];h+='<div class="nr" style="flex-wrap:wrap"><span class="ni" style="color:'+cc+';min-width:50px">'+d.id+'</span><span style="font-size:13px;font-weight:600;color:var(--tx);min-width:80px">'+(dm.name||d.id)+'</span><span style="font-size:11px;color:var(--td);flex:1">'+rm(dm.signature||'')+'</span>'+(d.count?'<span class="nc">'+d.count+'x</span>':'<span class="nc" style="opacity:.3">0x</span>')+'</div>';if(dm.description)h+='<div style="padding-left:55px;font-size:11px;color:var(--td);margin-bottom:2px">'+rm(dm.description)+'</div>';if(pids.length)h+='<div style="padding-left:55px;font-size:10px;color:var(--td);margin-bottom:4px">'+pids.map(function(pid){return'<span style="cursor:pointer;color:var(--ac);text-decoration:underline" onclick="sel=probs.find(function(p){return p.problem_id===\''+pid+'\'});curT=5;rList();rTabs();rCon()">'+pid+'</span>'}).join(' ')+'</div>'});h+='</div>'});return h}
function catByPrefix(id){var p=id.charAt(0);var m={'T':'말단','E':'수식','C':'조건','L':'제한','G':'기하','F':'함수','X':'존재','Q':'발문','S':'구조','O':'연산'};return m[p]||'기타'}

function rHi(p){if(!p.history||!p.history.length)return'<div class="empty">no history</div>';var h='<div class="sl">'+p.history.length+' versions</div>';[...p.history].reverse().forEach(function(v,ri){var oi=p.history.length-1-ri;var vn=oi+1;var ex=exH[oi];h+='<div class="hc"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700;color:var(--td)">v'+vn+' <span style="font-size:11px;font-weight:400">e:'+(v.skeleton||[]).length+'</span></span><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--td)">'+(v.created_at?new Date(v.created_at).toLocaleString('ko-KR'):'')+'</span><span class="ht" onclick="exH['+oi+']=!exH['+oi+'];rCon()">'+(ex?'hide':'show')+'</span></div></div>';if(ex&&v.skeleton){h+='<div style="margin-top:6px;max-height:260px;overflow-y:auto">';v.skeleton.forEach(function(e,j){var fs=Array.isArray(e.from)?e.from:[e.from];var nid=gn(e);var c=nc(bi(nid));var iS=e.main===false;h+='<div class="er'+(iS?' side':'')+'" style="border-left:2px solid '+c+';padding:3px 8px"><span style="font-size:10px;color:var(--td)">#'+(j+1)+' '+fs.join('+')+'</span> <span style="font-size:11px;color:'+c+';font-weight:700">'+nid+'</span> <span style="font-size:10px;color:var(--td)">\u2192 '+e.to+'</span>'+(e.note?'<div style="font-size:11px;padding-left:16px">'+rm(e.note)+'</div>':'')+'</div>'});h+='</div>'}h+='</div>'});return h}

function addTag(){var v=document.getElementById('mg-nt').value.trim();if(!v||!sel)return;if(!sel.tags)sel.tags=tg(sel);if(!sel.tags.custom)sel.tags.custom=[];if(sel.tags.custom.indexOf(v)<0)sel.tags.custom.push(v);rCon()}
function rmTag(i){if(!sel||!sel.tags||!sel.tags.custom)return;sel.tags.custom.splice(i,1);rCon()}
function addCl(){if(!sel)return;if(!sel.clues)sel.clues=[];sel.clues.push({id:'clue'+String.fromCharCode(65+sel.clues.length),text:''});rCon()}
function rmCl(i){if(!sel||!sel.clues)return;sel.clues.splice(i,1);rCon()}
function fmtSk(){var el=document.getElementById('mg-sk');try{el.value=JSON.stringify(JSON.parse(el.value),null,2)}catch(e){sMg('JSON error: '+e.message,false)}}
function readMg(){var cls=[],i=0;while(true){var a=document.getElementById('mg-ci-'+i),b=document.getElementById('mg-ct-'+i);if(!a||!b)break;if(a.value.trim())cls.push({id:a.value.trim(),text:b.value.trim()});i++}var sk;try{sk=JSON.parse(document.getElementById('mg-sk').value)}catch(e){return{err:'Skeleton: '+e.message}}return{pid:document.getElementById('mg-pid').value.trim(),ans:document.getElementById('mg-ans').value.trim(),src:document.getElementById('mg-src').value.trim(),thm:document.getElementById('mg-theme').value.trim(),dif:document.getElementById('mg-diff').value.trim(),stmt:document.getElementById('mg-stmt').value,cls:cls,sk:sk,sol:document.getElementById('mg-sol').value,ana:document.getElementById('mg-ana').value}}
function prevMg(){var d=readMg();if(d.err){sMg(d.err,false);return}sel.statement=d.stmt;sel.clues=d.cls;sel.skeleton=d.sk;sel.solution=d.sol;sel.analysis=d.ana;sel.answer=d.ans;curT=0;rTabs();rCon()}
async function saveMg(){if(!ghTk){sMg('Set token in register tab',false);return}var d=readMg();if(d.err){sMg(d.err,false);return}if(!d.pid){sMg('ID required',false);return}document.getElementById('mg-sv').disabled=true;if(!sel.history)sel.history=[];sel.history.push({skeleton:sel.skeleton,solution:sel.solution,analysis:sel.analysis,statement:sel.statement,answer:sel.answer,edge_count:(sel.skeleton||[]).length,created_at:sel.created_at||new Date().toISOString()});var old=sel.problem_id;sel.problem_id=d.pid;sel.answer=d.ans;sel.statement=d.stmt;sel.clues=d.cls;sel.skeleton=d.sk;sel.solution=d.sol;sel.analysis=d.ana;sel.created_at=new Date().toISOString();if(!sel.metadata)sel.metadata={};sel.metadata.source=d.src;sel.metadata.unit=d.thm;sel.metadata.difficulty=d.dif;if(!sel.tags)sel.tags={};sel.tags.source=d.src;sel.tags.theme=d.thm;sel.tags.difficulty=d.dif;try{await saveBS('edit: '+old+(old!==d.pid?' -> '+d.pid:''));sMg('Saved! (v'+(sel.history.length+1)+')',true);rList();rFilter();rTabs()}catch(e){sMg(e.message,false)}document.getElementById('mg-sv').disabled=false}
async function delProb(){if(!sel||!ghTk||!confirm('Delete '+sel.problem_id+'?'))return;var pid=sel.problem_id;var idx=probs.indexOf(sel);if(idx>=0)probs.splice(idx,1);try{await delProbFile(pid,'delete: '+pid);sel=probs.length?probs[0]:null;rList();rFilter();rTabs();rCon()}catch(e){alert(e.message)}}
function sMg(m,ok){var el=document.getElementById('mg-st');if(el)el.innerHTML='<div class="reg-status '+(ok?'reg-ok':'reg-err')+'">'+m+'</div>'}

function rReg(){return'<div style="font-size:20px;font-weight:800;color:var(--tb);margin-bottom:12px">Register</div><div class="sl">GitHub Token</div><input class="reg-token" type="password" id="reg-tk" placeholder="ghp_..." value="'+ghTk+'" onchange="ghTk=this.value;localStorage.setItem(\'gh_token\',ghTk)"><button class="mg-btn mg-btn-s" style="margin-bottom:10px" onclick="ghTk=document.getElementById(\'reg-tk\').value;localStorage.setItem(\'gh_token\',ghTk);probs=[];nMap={};nAll=[];sel=null;load()">Reload</button><div class="sl" style="margin-top:10px">JSON</div><textarea class="reg-input" id="reg-json" style="min-height:220px;font-family:monospace" placeholder=\'{"problem_id":"D1","skeleton":[...]}\'></textarea><div style="display:flex;gap:6px;margin-top:8px"><button class="mg-btn mg-btn-s" onclick="valReg()">Validate</button><button class="mg-btn mg-btn-p" id="reg-sub" onclick="subReg()">Register</button></div><div id="reg-st"></div>'}
function sRS(m,ok){var el=document.getElementById('reg-st');if(el)el.innerHTML='<div class="reg-status '+(ok?'reg-ok':'reg-err')+'">'+m+'</div>'}
function valReg(){var r=document.getElementById('reg-json').value.trim();if(!r){sRS('empty',false);return}try{var d=JSON.parse(r);var e=Array.isArray(d)?d:[d];var er=[];for(var i=0;i<e.length;i++){if(!e[i].problem_id)er.push(i+': no id');if(!e[i].skeleton||!e[i].skeleton.length)er.push(i+': no skeleton');if(probs.some(function(x){return x.problem_id===e[i].problem_id}))er.push(i+': '+e[i].problem_id+' exists')}if(er.length)sRS(er.join('\n'),false);else sRS('Valid! '+e.length+' items',true)}catch(e){sRS('parse error',false)}}
async function subReg(){if(!ghTk){sRS('set token',false);return}var r=document.getElementById('reg-json').value.trim();if(!r)return;var d;try{d=JSON.parse(r)}catch(e){sRS('parse error',false);return}var entries=Array.isArray(d)?d:[d];entries.forEach(function(e){if(!e.created_at)e.created_at=new Date().toISOString();if(!e.history)e.history=[];if(!e.tags)e.tags={source:'',theme:'',difficulty:'',custom:[]}});document.getElementById('reg-sub').disabled=true;sRS('saving...',true);try{var ad=[],rn=[];entries.forEach(function(entry){var exists=probs.some(function(x){return x.problem_id===entry.problem_id});if(exists){var base=entry.problem_id;var cnt=probs.filter(function(x){return x.problem_id.startsWith(base)}).length;var nid=base+'_'+(cnt+1);rn.push(base+'->'+nid);entry.problem_id=nid}probs.push(entry);ad.push(entry.problem_id)});await saveProbs('register: '+ad.join(', '),entries);var msg='Done! +'+ad.length;if(rn.length)msg+=' renamed:'+rn.join(',');msg+=' total:'+probs.length;sRS(msg,true);rList();rFilter();rTabs();document.getElementById('reg-json').value=''}catch(e){sRS(e.message,false)}document.getElementById('reg-sub').disabled=false}

async function saveBS(msg,prob){var p=prob||sel;if(!p||!ghTk)throw new Error('no problem or token');var fn=p.problem_id.replace(/[\/\\<>:"|?*]/g,'_').replace(/[\s.]+$/,'')+'.json';var fpath='docs/bookshelf/'+fn;var api='https://api.github.com/repos/'+OW+'/'+RP+'/contents/'+fpath+'?ref='+BR;var nc=btoa(unescape(encodeURIComponent(JSON.stringify(p,null,2))));var sha=probShas[p.problem_id]||'';if(!sha){try{var gr=await fetch(api,{headers:{'Authorization':'token '+ghTk}});if(gr.ok){sha=(await gr.json()).sha}}catch(e){}}var body={message:msg,content:nc,branch:BR};if(sha)body.sha=sha;var pr=await fetch(api,{method:'PUT',headers:{'Authorization':'token '+ghTk,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!pr.ok)throw new Error('save:'+pr.status);probShas[p.problem_id]=(await pr.json()).content.sha}
async function saveProbs(msg,pList){for(var i=0;i<pList.length;i++){try{await saveBS(msg,pList[i])}catch(e){console.error('save fail:'+pList[i].problem_id,e)}}}
async function delProbFile(pid,msg){if(!ghTk)return;var fn=pid.replace(/[\/\\<>:"|?*]/g,'_').replace(/[\s.]+$/,'')+'.json';var fpath='docs/bookshelf/'+fn;var api='https://api.github.com/repos/'+OW+'/'+RP+'/contents/'+fpath+'?ref='+BR;var sha=probShas[pid]||'';if(!sha){try{var gr=await fetch(api,{headers:{'Authorization':'token '+ghTk}});if(gr.ok){sha=(await gr.json()).sha}}catch(e){}}if(!sha)return;var dr=await fetch(api,{method:'DELETE',headers:{'Authorization':'token '+ghTk,'Content-Type':'application/json'},body:JSON.stringify({message:msg||'delete '+pid,sha:sha,branch:BR})});if(!dr.ok)console.error('delete fail:'+dr.status);delete probShas[pid]}
load();
